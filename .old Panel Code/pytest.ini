[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts = --strict-markers -m "not slow and not very_slow"
markers =
    important: business-critical smoke/regression tests for PR and pre-push
    slow: long-running tests (browser, visual, export, heavy integration)
    very_slow: expensive full-stack/end-to-end tests for nightly/release runs
