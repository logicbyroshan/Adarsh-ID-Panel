<!-- Upgrade All Classes Confirmation Modal (Dashboard) -->
<div id="dashUpgradeAllModal" class="modal-backdrop"
     x-show="activeModal === 'dashUpgrade'" x-transition.opacity
     style="display:none">
  <div class="modal-center modal-warning modal-compact" @click.stop
       x-show="activeModal === 'dashUpgrade'" x-transition.scale.origin.center>
    <div class="modal-header">
      <h3><i class="fa-solid fa-arrow-up"></i> Upgrade All Classes</h3>
      <button type="button" class="modal-close" @click="closeModal" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-body-center">
        <div class="confirm-flow">
          <div class="modal-stepper" aria-hidden="true">
            <div class="modal-step is-active">
              <span class="modal-step-dot">1</span>
              <span class="modal-step-label">Review</span>
            </div>
            <div class="modal-stepper-line"></div>
            <div class="modal-step is-active">
              <span class="modal-step-dot">2</span>
              <span class="modal-step-label">Verify</span>
            </div>
          </div>

          <div class="confirm-flow-meta">
            <p>Table: <strong id="dashUpgradeTableName"></strong></p>
            <p>This will upgrade the class value of <strong id="dashUpgradeCount"></strong> cards in the <strong>Download list</strong> to the next level (e.g. V &rarr; VI).</p>
          </div>

          <div class="alert-box alert-box--warning">
            <p class="alert-box-heading">
              <i class="fa-solid fa-circle-exclamation"></i> Please Confirm
            </p>
            <ul class="alert-box-list">
              <li>This action <strong>CANNOT</strong> be undone</li>
              <li>All cards in the Download list will be upgraded</li>
            </ul>
          </div>

          <div class="confirm-flow-verify">
            <p class="confirm-code-hint">Type this code to confirm:</p>
            <div id="dashUpgradeCode" class="verify-code">----------</div>
            <div class="confirm-code-input-wrap" id="dashUpgradeCodeWrap" onclick="document.getElementById('dashUpgradeCodeInput').focus()">
              <div class="confirm-code-boxes" id="dashUpgradeCodeBoxes" aria-hidden="true">
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
                <span class="confirm-code-box"></span>
              </div>
              <input type="text" id="dashUpgradeCodeInput"
                  maxlength="10"
                  inputmode="numeric"
                  pattern="[0-9]{10}"
                  autocomplete="off"
                  class="confirm-code-input confirm-code-input-hidden"
                  oninput="this.value=this.value.replace(/[^0-9]/g,'')"
              >
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="dashUpgradeCancel" class="btn btn-md btn-neutral" type="button"
              @click="closeModal"><i class="fa-solid fa-xmark"></i> Cancel</button>
      <button id="dashUpgradeConfirm" class="btn btn-md btn-warning" type="button" disabled><i class="fa-solid fa-arrow-up"></i> Upgrade All Classes</button>
    </div>
  </div>
</div>
