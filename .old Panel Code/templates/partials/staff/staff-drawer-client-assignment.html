{% comment %}
Staff Drawer - Client Assignment Section
Partial for operator client assignment multiselect.
{% endcomment %}

<!-- Client Assignment Section (Operator Only) -->
<div class="form-section" id="client-assignment-section" style="display: none;">
    <h3 class="section-title">
        <i class="fa-solid fa-building-user"></i> Client Assignment
    </h3>
    <div class="form-group">
        <label class="form-label">Assign Clients</label>
        <div class="client-multiselect" id="client-multiselect">
            <div class="client-multiselect-header" id="client-multiselect-toggle">
                <span class="client-multiselect-placeholder" id="client-multiselect-text">Select clients...</span>
                <i class="fa-solid fa-chevron-down client-multiselect-arrow"></i>
            </div>
            <div class="client-multiselect-dropdown" id="client-multiselect-dropdown" style="display: none;">
                <div class="client-multiselect-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="client-search-input" placeholder="Search clients..." autocomplete="off">
                </div>
                <div class="client-multiselect-list" id="client-multiselect-list">
                    <!-- Client checkboxes will be populated dynamically -->
                </div>
                <div class="client-multiselect-empty" id="client-multiselect-empty" style="display: none;">
                    No clients found
                </div>
            </div>
        </div>
        <small class="field-hint">Select one or more clients this staff can manage.</small>
    </div>
</div>
