{% comment %}
Staff Drawer - Footer Section
Partial for drawer action buttons (Cancel, Temp Password, Submit).
{% endcomment %}

<div class="drawer-footer">
    <button type="button" class="btn btn-md btn-neutral" id="drawer-cancel-btn"><i class="fa-solid fa-xmark"></i> Cancel</button>
    <button type="button" class="btn btn-md btn-warning" id="tempPasswordStaffBtn" style="display:none;" onclick="openTempPasswordModal('staff')">
        <i class="fa-solid fa-key"></i> Set Temp Password
    </button>
    <button type="submit" class="btn btn-md btn-primary" id="drawer-submit-btn">
        <i class="fa-solid fa-floppy-disk"></i> <span id="submit-btn-text">Add Operator</span>
    </button>
</div>
