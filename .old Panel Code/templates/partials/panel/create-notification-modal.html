<!-- Create Notification Modal -->
<div class="center-modal-overlay center-modal-theme-blue" id="createNotifModal">
  <div class="center-modal-card center-modal-card--form" @click.stop>
    <!-- Header -->
    <div class="center-modal-header">
      <h3><i class="fa-solid fa-bell"></i> Create Notification</h3>
      <button type="button" class="center-modal-header-close" onclick="closeCreateModal()" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Body -->
    <div class="center-modal-body-area">
    <form id="createNotifForm" onsubmit="return handleCreateNotif(event)">
      {% csrf_token %}

      <div class="modal-stepper modal-stepper--wide" aria-hidden="true">
        <div class="modal-step is-active" id="createNotifStep1Badge">
          <span class="modal-step-dot">1</span>
          <span class="modal-step-label">Content</span>
        </div>
        <div class="modal-stepper-line"></div>
        <div class="modal-step" id="createNotifStep2Badge">
          <span class="modal-step-dot">2</span>
          <span class="modal-step-label">Audience</span>
        </div>
      </div>

      <div id="createNotifStep1Panel" class="modal-step-panel">
        <div class="alert-box alert-box--info alert-box-inline" style="margin-bottom:10px;">
          <i class="fa-solid fa-pen-to-square"></i>
          <p class="alert-box-text">Write the message first, then choose who should receive it.</p>
        </div>

        <!-- Title -->
        <label class="panel-form-label">Title *</label>
        <input type="text" class="panel-form-input" id="notifTitle" placeholder="e.g. System Maintenance Scheduled" required maxlength="200">

        <!-- Message -->
        <label class="panel-form-label">Message *</label>
        <textarea class="panel-form-input" id="notifMessage" placeholder="Write your notification message..." rows="3" required></textarea>

        <!-- Row: Category + Priority -->
        <div class="panel-form-row">
          <div>
            <label class="panel-form-label">Category</label>
            <select class="form-select panel-form-select" id="notifCategory">
              <option value="general">General</option>
              <option value="announcement">Announcement</option>
              <option value="update">System Update</option>
              <option value="maintenance">Maintenance</option>
              <option value="alert">Alert</option>
            </select>
          </div>
          <div>
            <label class="panel-form-label">Priority</label>
            <select class="form-select panel-form-select" id="notifPriority">
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
      </div>

      <div id="createNotifStep2Panel" class="modal-step-panel" style="display:none;">
        <!-- Target -->
        <label class="panel-form-label">Send To</label>
        <select class="form-select panel-form-select" id="notifTarget" onchange="handleTargetChange()">
          <option value="all">All Users</option>
          <option value="super_admin">Super Admins Only</option>
          <option value="admin_staff">Operator Only</option>
          <option value="client">Clients Only</option>
          <option value="client_staff">Assistent Only</option>
          <option value="selected">Select Specific Users...</option>
        </select>

        <!-- User picker (shown when target=selected) -->
        <div id="userPickerWrap" style="display:none;">
          <label class="panel-form-label">Select Users</label>
          <div class="user-picker" id="userPicker">
            <div class="user-picker-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" placeholder="Search users..." oninput="filterUserPicker(this.value)">
            </div>
            <div class="user-picker-list" id="userPickerList">
              <div class="user-picker-skeleton" aria-hidden="true">
                {% for _ in "1234" %}
                <div class="user-picker-skeleton-row">
                  <span class="user-picker-skeleton-block user-picker-skeleton-check"></span>
                  <span class="user-picker-skeleton-block user-picker-skeleton-name"></span>
                  <span class="user-picker-skeleton-block user-picker-skeleton-role"></span>
                </div>
                {% endfor %}
              </div>
              <span class="sr-only">Loading users...</span>
            </div>
            <div class="user-picker-selected" id="userPickerSelected"></div>
          </div>
        </div>

        <!-- Email option -->
        <label class="email-toggle">
          <input type="checkbox" id="notifSendEmail">
          <span>Also send email notification</span>
        </label>

        <label class="panel-form-label">Visible For (Hours)</label>
        <input type="number" class="panel-form-input" id="notifVisibilityHours" value="24" min="24" step="1" max="8760">
        <span class="panel-subnote">Default is 24 hours. Increase this value to keep notification visible longer.</span>
      </div>
    </form>
    </div><!-- end body-area -->
    <!-- Footer -->
    <div class="center-modal-footer-area">
      <button type="button" class="center-modal-btn center-modal-btn-cancel" onclick="closeCreateModal()">Cancel</button>
      <button type="button" class="center-modal-btn center-modal-btn-cancel" id="createNotifBackBtn" style="display:none;">
        <i class="fa-solid fa-arrow-left"></i> Back
      </button>
      <button type="button" class="center-modal-btn center-modal-btn-confirm" id="createNotifBtn" data-mode="next">
        Next <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </div>
</div>
