<!-- === LOGS & UPDATES TAB (Logs + Monitoring) === -->
<div class="panel-tab-content panel-tab-full-height log-panel-theme operations-panel-theme" id="tab-log-history">

  <div class="notif-actions-bar">
    <div class="notif-actions-left">
      <div class="notif-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="opsSearch" placeholder="Search users, updates, logs, tasks..." oninput="debounceOpsSearch()">
      </div>
      <select id="opsSourceFilter" class="form-select form-select-sm" onchange="handleOpsSourceChange()">
        <option value="logs" selected>System Logs</option>
        <option value="all">All Sources</option>
        <option value="tasks">Background Tasks</option>
        <option value="backups">Backup Tasks</option>
      </select>
      <select id="opsUserTypeFilter" class="form-select form-select-sm" onchange="loadOperationsFeed(1)">
        <option value="">All User Types</option>
        <option value="super_admin">Super Admin</option>
        <option value="admin_staff">Operator</option>
        <option value="client">Client</option>
        <option value="client_staff">Assistent</option>
      </select>
      <select id="opsTaskStatusFilter" class="form-select form-select-sm" onchange="loadOperationsFeed(1)">
        <option value="">All Task Status</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="completed">Completed</option>
        <option value="failed">Failed</option>
        <option value="cancelled">Cancelled</option>
        <option value="deleted">Deleted</option>
      </select>
      <select id="opsActionFilter" class="form-select form-select-sm" onchange="loadOperationsFeed(1)">
        <option value="">All Update Actions</option>
        <option value="login">Login</option>
        <option value="logout">Logout</option>
        <option value="password_reset">Password Reset</option>
        <option value="impersonate_start">Impersonation Start</option>
        <option value="impersonate_stop">Impersonation Stop</option>
        <option value="client_create">Client Create</option>
        <option value="client_update">Client Update</option>
        <option value="client_delete">Client Delete</option>
        <option value="staff_create">Staff Create</option>
        <option value="staff_update">Staff Update</option>
        <option value="staff_delete">Staff Delete</option>
        <option value="staff_password_reset">Staff Password Reset</option>
        <option value="card_create">Card Create</option>
        <option value="card_update">Card Update</option>
        <option value="card_delete">Card Delete</option>
        <option value="bulk_delete">Bulk Delete</option>
        <option value="bulk_upgrade">Bulk Upgrade</option>
        <option value="notification_create">Notification Create</option>
        <option value="notification_delete">Notification Delete</option>
        <option value="email_send">Email Send</option>
        <option value="email_resend">Email Resend</option>
        <option value="backup_initiate">Backup Initiate</option>
        <option value="backup_start">Backup Start</option>
        <option value="backup_delete">Backup Delete</option>
        <option value="settings_update">Settings Update</option>
      </select>
    </div>
    <div class="notif-actions-right">
      <button class="btn btn-sm btn-neutral" type="button" onclick="resetOperationsFilters()" id="opsResetBtn">
        <i class="fa-solid fa-filter-circle-xmark"></i> Reset Filters
      </button>
      <a class="btn btn-sm btn-warning" href="{% url 'pro_user_log_deletion_guard' %}" id="opsGuardLogsBtn">
        <i class="fa-solid fa-shield"></i> Log Deletion Guard
      </a>
      <button class="btn btn-sm btn-outline-primary" onclick="loadOperationsFeed()" id="opsRefreshBtn">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
  </div>

  <div class="notif-table-wrap">
    <table class="notif-table" id="opsTable">
      <colgroup>
        <col style="width: 5%;">
        <col style="width: 11%;">
        <col style="width: 14%;">
        <col style="width: 12%;">
        <col style="width: 14%;">
        <col style="width: 30%;">
        <col style="width: 14%;">
      </colgroup>
      <thead>
        <tr>
          <th scope="col">Sr no.</th>
          <th scope="col">Source</th>
          <th scope="col">Event</th>
          <th scope="col">Status / Action</th>
          <th scope="col">User</th>
          <th scope="col">Details</th>
          <th scope="col">Time</th>
        </tr>
      </thead>
      <tbody id="opsTableBody">
        <tr class="notif-table-empty">
          <td colspan="7">
            <div class="empty-state">
              <i class="fa-solid fa-wave-square"></i>
              <p>No logs or updates found</p>
              <span>Background tasks and system logs will appear here.</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination-bar notif-pagination-bar">
    <div class="pagination-left">
      <span class="pagination-info" id="opsPaginationInfo">Showing <strong>0-0</strong> of <strong>0</strong> results</span>
    </div>
    <div class="pagination-center">
      <button class="pagination-btn" id="opsFirstBtn" onclick="opsSetPage(1)" disabled title="First Page" aria-label="First page">
        <i class="fa-solid fa-angles-left"></i>
      </button>
      <button class="pagination-btn" id="opsPrevBtn" onclick="opsPage(-1)" disabled title="Previous Page" aria-label="Previous page">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <span class="page-numbers" id="opsPageNumbers">
        <button class="page-num active">1</button>
      </span>
      <button class="pagination-btn" id="opsNextBtn" onclick="opsPage(1)" disabled title="Next Page" aria-label="Next page">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <button class="pagination-btn" id="opsLastBtn" onclick="opsSetPage(-1)" disabled title="Last Page" aria-label="Last page">
        <i class="fa-solid fa-angles-right"></i>
      </button>
    </div>
    <div class="pagination-right">
      <label for="opsRowsPerPage">Rows per page:</label>
      <select id="opsRowsPerPage" class="form-select form-select-sm" onchange="onOpsRowsPerPageChange(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

</div>
