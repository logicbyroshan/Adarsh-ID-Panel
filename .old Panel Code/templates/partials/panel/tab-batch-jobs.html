<!-- === BATCH JOBS TAB === -->
<div class="panel-tab-content panel-tab-full-height batch-jobs-panel-theme" id="tab-batch-jobs">
  <div class="notif-actions-bar">
    <div class="notif-actions-left">
      <span class="batch-jobs-panel-kicker">
        <i class="fa-solid fa-bars-progress"></i>
        Batch Jobs
      </span>
      <span class="panel-subnote">Track active, pending, completed, and failed tasks in real time.</span>
    </div>
    <div class="notif-actions-right">
      <span class="panel-muted-count" id="batchJobLastUpdated">Updated just now</span>
      <button type="button" class="btn btn-sm btn-outline-primary" id="batchJobRefreshBtn" onclick="loadManagePanelBatchJobProgressCenter(true)">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
  </div>

  <div class="panel-batch-jobs-scroll">
    <div class="batch-job-stats">
      <div class="batch-job-stat-card">
        <span class="batch-job-stat-label">Active</span>
        <span class="batch-job-stat-value" id="batchJobActiveCount">0</span>
      </div>
      <div class="batch-job-stat-card">
        <span class="batch-job-stat-label">Pending</span>
        <span class="batch-job-stat-value" id="batchJobPendingCount">0</span>
      </div>
      <div class="batch-job-stat-card">
        <span class="batch-job-stat-label">Processing</span>
        <span class="batch-job-stat-value" id="batchJobProcessingCount">0</span>
      </div>
      <div class="batch-job-stat-card">
        <span class="batch-job-stat-label">Completed (24h)</span>
        <span class="batch-job-stat-value" id="batchJobCompletedCount">0</span>
      </div>
      <div class="batch-job-stat-card">
        <span class="batch-job-stat-label">Failed (24h)</span>
        <span class="batch-job-stat-value" id="batchJobFailedCount">0</span>
      </div>
    </div>

    <div class="batch-job-list" id="batchJobProgressList">
      <div class="batch-job-empty">
        <i class="fa-solid fa-spinner fa-spin"></i>
        Loading batch jobs...
      </div>
    </div>
  </div>
</div>
