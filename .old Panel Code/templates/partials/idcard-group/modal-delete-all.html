<!-- Delete All Confirmation Modal -->
<div id="deleteAllModal" class="center-modal-overlay center-modal-theme-red"
  x-show="isDeleteAllModalOpen" x-transition.opacity
     style="display:none">
  <div class="center-modal-card center-modal-card--compact" @click.stop
    x-show="isDeleteAllModalOpen" x-transition.scale.origin.center>
    <!-- Header -->
    <div class="center-modal-header">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Delete All ID Cards</h3>
      <button type="button" class="center-modal-header-close" @click="closeModal" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Body -->
    <div class="center-modal-body-area">
    <div class="confirm-flow">
      <div class="modal-stepper" aria-hidden="true">
        <div class="modal-step is-active">
          <span class="modal-step-dot">1</span>
          <span class="modal-step-label">Review</span>
        </div>
        <div class="modal-stepper-line"></div>
        <div class="modal-step is-active">
          <span class="modal-step-dot">2</span>
          <span class="modal-step-label">Verify</span>
        </div>
      </div>

      <div class="confirm-flow-meta">
        <p>Table: <strong id="deleteAllTableName"></strong></p>
        <p>This will permanently delete <strong id="deleteAllCount"></strong> cards from <strong>ALL lists</strong> (Pending, Verified, Approved, Download, Pool).</p>
      </div>

      <div class="alert-box alert-box--danger">
        <p class="alert-box-heading">
          <i class="fa-solid fa-circle-exclamation"></i> Warning
        </p>
        <ul class="alert-box-list">
          <li>Every card in all statuses will be removed permanently</li>
          <li>This action cannot be undone</li>
        </ul>
      </div>

      <div class="confirm-flow-verify">
        <p class="verify-hint">Type this code to confirm:</p>
        <div class="center-modal-code" id="deleteAllCode"></div>
        <div class="confirm-code-input-wrap" id="deleteAllCodeWrap" onclick="document.getElementById('deleteAllCodeInput').focus()">
          <div class="confirm-code-boxes" id="deleteAllCodeBoxes" aria-hidden="true">
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
          </div>
          <input type="text" id="deleteAllCodeInput" class="center-modal-input confirm-code-input-hidden" maxlength="10" autocomplete="off" inputmode="numeric" pattern="[0-9]{10}" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
        </div>
      </div>
    </div>
    </div><!-- end body-area -->
    <!-- Footer -->
    <div class="center-modal-footer-area">
      <button id="deleteAllCancel" class="btn btn-md btn-neutral" @click="closeModal">
        <i class="fa-solid fa-xmark"></i> Cancel
      </button>
      <button id="deleteAllConfirm" class="btn btn-md btn-danger" disabled>
        <i class="fa-solid fa-trash"></i> Delete All Cards
      </button>
    </div>
  </div>
</div>
