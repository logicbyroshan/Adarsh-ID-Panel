<!-- =================================================
     Notification Bell + Dropdown (reusable partial)
     Include in any page's nav-right area.
     Requires: tailwind.css (has .notif-* classes),
               notification-bell.js
     Hidden for admin users (super_admin / admin_staff).
     ================================================= -->
{% if active_page == 'dashboard' %}
<style>
  /* Notification bell dropdown  -  larger font sizes */
  .notif-item .notif-title { font-size: var(--ui-font-size-base, 14px) !important; }
  .notif-item .notif-text  { font-size: var(--ui-font-size-md, 13px) !important; }
  .notif-item .notif-time  { font-size: var(--ui-font-size-sm, 12px) !important; }
  .notif-empty             { font-size: var(--ui-font-size-base, 14px) !important; }
</style>
<div class="notif-wrapper" id="notifWrapper" data-notifications-url="{% url 'notifications_page' %}">
  <button class="notif-btn" id="notifBtn" title="Notifications" aria-label="Notifications" onclick="toggleNotifDropdown()">
    <i class="fa-solid fa-bell"></i>
    <span class="notif-badge" id="notifBadge"></span>
  </button>
  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-dropdown-header">
      <h4><i class="fa-solid fa-bell"></i> Notifications</h4>
      <button class="notif-mark-all-btn" onclick="markAllNotificationsRead()">Mark all read</button>
    </div>
    <div class="notif-list" id="notifList">
      <div class="notif-empty">
        <i class="fa-solid fa-bell-slash"></i>
        No notifications yet
      </div>
    </div>
  </div>
</div>
{% endif %}
