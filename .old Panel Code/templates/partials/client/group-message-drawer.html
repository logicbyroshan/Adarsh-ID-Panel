<style>
  #group-message-drawer {
    --msg-surface: var(--color-white);
    --msg-surface-soft: #f8fbff;
    --msg-border: #d9e8f7;
    --msg-text: #16324a;
    --msg-muted: #5d7892;
    --msg-accent: #1f8cf0;
    --msg-accent-2: #2ec8b8;
    --msg-shadow: 0 14px 34px rgba(14, 45, 82, 0.18);
    --msg-scroll-track: #e8f1fb;
    --msg-scroll-thumb: linear-gradient(180deg, #4dbcf7 0%, #2fa2f2 55%, #2dc5b9 100%);
  }

  #group-message-drawer::before {
    background: rgba(9, 20, 36, 0.42);
    backdrop-filter: blur(2px);
  }

  #group-message-drawer .drawer-content {
    height: 100%;
    max-height: 100vh;
    display: flex;
    flex-direction: column;
    border-left: 0;
    box-shadow: var(--msg-shadow);
    background: linear-gradient(180deg, #f4f9ff 0%, #eef6ff 100%);
  }

  #group-message-drawer .drawer-header {
    background: linear-gradient(120deg, #0f5fae 0%, #1d80df 48%, #24b9b9 100%);
    border-bottom: 0;
    box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.22);
  }

  #group-message-drawer .drawer-header h3 {
    letter-spacing: 0.2px;
  }

  #group-message-drawer .drawer-close {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  #group-message-drawer .drawer-close:hover {
    background: rgba(255, 255, 255, 0.24);
  }

  #group-message-drawer .drawer-body {
    flex: 1;
    min-height: 0;
    padding: 12px 14px;
    overflow: hidden;
    background: radial-gradient(circle at top right, rgba(79, 172, 254, 0.1), rgba(0, 0, 0, 0) 32%),
                radial-gradient(circle at bottom left, rgba(46, 200, 184, 0.09), rgba(0, 0, 0, 0) 30%);
  }

  .group-msg-layout {
    display: grid;
    grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
    gap: 0;
    flex: 1;
    min-height: 0;
    height: auto;
  }

  .group-msg-panel {
    border: 1px solid #cfe2f5;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.96);
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(16, 64, 109, 0.08);
  }

  .group-msg-panel:first-child,
  .group-msg-panel:last-child {
    padding: 0;
  }

  .group-msg-panel:first-child {
    border-radius: 12px 0 0 12px;
  }

  .group-msg-panel:last-child {
    border-radius: 0 12px 12px 0;
    border-left: 0;
  }

  .group-msg-panel-head {
    padding: 10px 12px;
    border-bottom: 1px solid #dbe8f6;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    background: transparent;
  }

  .group-msg-panel-head-right {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .group-msg-top-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }

  .group-msg-top-control-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .group-msg-inline-title {
    font-size: var(--ui-font-size-xs, 11px);
    color: var(--msg-muted);
    font-weight: 700;
    margin-right: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .group-msg-panel-body {
    padding: 10px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .group-msg-panel:first-child .group-msg-panel-body {
    padding: 10px 0 10px 10px;
  }

  .group-msg-panel:first-child .group-msg-search-row {
    padding-right: 10px;
  }

  .group-msg-panel:last-child .group-msg-panel-body {
    padding: 10px 12px 10px 12px;
  }

  .group-msg-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .group-msg-radio {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: var(--ui-font-size-sm, 12px);
    color: #234760;
    border: 1px solid #d2e7fb;
    border-radius: 8px;
    padding: 5px 10px;
    background: #f5fbff;
    transition: background-color 0.18s ease, border-color 0.18s ease;
  }

  .group-msg-radio:has(input:checked) {
    background: #e7f4ff;
    border-color: #88c7ff;
    box-shadow: inset 0 0 0 1px rgba(53, 135, 214, 0.16);
  }

  .group-msg-radio input[type="radio"] {
    accent-color: #2f95ef;
  }

  .group-msg-search-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .group-msg-search-row .form-input {
    flex: 1;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    padding: 0 11px;
    font-size: var(--ui-font-size-sm, 12px);
    border-radius: 9px;
    border-color: #cfe2f5;
    background: #fcfeff;
  }

  .group-msg-search-row .form-input:focus {
    border-color: #73b6f8;
    box-shadow: 0 0 0 3px rgba(54, 144, 236, 0.18);
  }

  #groupMessageSelectAllVisibleBtn,
  #groupMessageClearSelectionBtn {
    border-radius: 9px !important;
    border-color: #cfe2f5 !important;
    background: #f8fbff !important;
    color: #325779 !important;
    height: 34px !important;
    min-height: 34px !important;
    padding: 0 12px !important;
    font-size: var(--ui-font-size-sm, 12px) !important;
    font-weight: 600 !important;
    line-height: 1 !important;
    transition: all 0.18s ease;
  }

  #groupMessageSelectAllVisibleBtn:hover,
  #groupMessageClearSelectionBtn:hover {
    background: #edf6ff !important;
    border-color: #9ecdf7 !important;
    color: #1c4c76 !important;
  }

  .group-msg-clients-list {
    border: 0;
    border-radius: 0;
    overflow: auto;
    overflow-x: hidden;
    min-height: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0;
    background: transparent;
    direction: ltr;
  }

  .group-msg-client-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    box-sizing: border-box;
    border: 0;
    border-radius: 10px;
    border-bottom: 1px solid #d8e7f7;
    padding: 10px 10px;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: background-color 0.14s ease, border-color 0.14s ease;
    direction: ltr;
  }

  .group-msg-client-row.selected {
    background: linear-gradient(90deg, #e7f2ff 0%, #eef8ff 100%);
    border-bottom-color: transparent;
    padding-left: 14px;
    padding-right: 14px;
  }

  .group-msg-client-row.selected::before {
    content: "";
    position: absolute;
    left: 3px;
    top: 8px;
    bottom: 8px;
    width: 4px;
    border-radius: 8px;
    background: linear-gradient(180deg, #318de6 0%, #35bea8 100%);
  }

  .group-msg-client-row:hover {
    background: #f1f7ff;
  }

  .group-msg-client-row.active {
    border-bottom-color: transparent;
    box-shadow: 0 0 0 2px rgba(43, 144, 235, 0.2);
    background: #eaf5ff;
  }

  .group-msg-client-row.selected.active {
    box-shadow: 0 0 0 2px rgba(31, 132, 224, 0.3);
  }

  .group-msg-client-avatar {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid #d6e6f7;
    background: var(--color-white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .group-msg-client-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: var(--color-white);
  }

  .group-msg-client-avatar i {
    color: #67819a;
    font-size: var(--ui-font-size-sm, 12px);
  }

  .group-msg-client-meta {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .group-msg-client-name {
    color: var(--msg-text);
    font-size: var(--ui-font-size-md, 13px);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .group-msg-client-sub {
    color: var(--msg-muted);
    font-size: var(--ui-font-size-xs, 11px);
  }

  .group-msg-client-row.selected .group-msg-client-name {
    color: #124f83;
  }

  .group-msg-client-row.selected .group-msg-client-sub {
    color: #356585;
  }

  .group-msg-chat-body {
    flex: 1;
    border: 0;
    border-radius: 0;
    background: transparent;
    min-height: 0;
    max-height: none;
    overflow: auto;
    padding: 0 6px 0 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .group-msg-chat-body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }

  .group-msg-composer {
    border: 0;
    border-radius: 0;
    background: transparent;
    padding: 10px 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: auto;
    box-shadow: none;
    border-top: 1px solid #dbe8f6;
  }

  #groupMessageText {
    border-radius: 0;
    border: 0;
    background: transparent;
    resize: vertical;
    min-height: 112px;
    padding: 0;
    line-height: 1.5;
  }

  #groupMessageText:focus {
    border: 0;
    box-shadow: none;
  }

  .group-msg-action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    border-top: 1px solid #dbe8f6;
    padding-top: 9px;
  }

  .group-msg-action-buttons {
    display: inline-flex;
    gap: 8px;
  }

  .group-msg-btn {
    border-radius: 10px !important;
    min-height: 34px;
  }

  #sendGroupMessageBtn {
    background: linear-gradient(130deg, var(--msg-accent) 0%, var(--msg-accent-2) 100%) !important;
    border: 0 !important;
    color: var(--color-white) !important;
    box-shadow: 0 8px 18px rgba(31, 140, 240, 0.34);
  }

  #sendGroupMessageBtn:hover {
    filter: brightness(0.98);
    transform: translateY(-1px);
  }

  .group-msg-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .group-msg-counter {
    font-size: var(--ui-font-size-xs, 11px);
    color: var(--color-slate-500);
    font-weight: 700;
  }

  .group-msg-history-state {
    text-align: center;
    padding: 18px 12px;
    color: var(--color-slate-500);
    font-size: var(--ui-font-size-md, 13px);
  }

  .group-msg-history-item {
    border: 0;
    border-radius: 14px 14px 14px 4px;
    background: var(--color-white);
    box-shadow: 0 8px 18px rgba(15, 68, 120, 0.12);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .group-msg-history-item.is-removed {
    opacity: 0.82;
    box-shadow: 0 6px 12px rgba(15, 68, 120, 0.08);
  }

  .group-msg-history-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .group-msg-history-title {
    font-size: var(--ui-font-size-sm, 12px);
    font-weight: 700;
    color: #0f3f67;
  }

  .group-msg-history-time {
    font-size: var(--ui-font-size-xs, 11px);
    color: var(--color-slate-500);
    white-space: nowrap;
  }

  .group-msg-history-delete {
    border: 0;
    border-radius: 8px;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--color-red-100);
    color: var(--color-red-700);
    cursor: pointer;
  }

  .group-msg-history-delete:hover {
    background: var(--color-red-200);
  }

  .group-msg-history-delete:disabled {
    opacity: 0.65;
    cursor: wait;
  }

  .group-msg-history-text {
    font-size: var(--ui-font-size-md, 13px);
    line-height: 1.55;
    color: var(--color-slate-800);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .group-msg-history-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    font-size: var(--ui-font-size-xs, 11px);
    color: var(--color-slate-500);
  }

  .group-msg-history-expiry {
    font-size: var(--ui-font-size-xs, 11px);
    color: #9a3412;
    font-weight: 700;
  }

  .group-msg-clients-list {
    scrollbar-width: thin;
    scrollbar-color: #5cb5f6 var(--msg-scroll-track);
  }

  .group-msg-clients-list::-webkit-scrollbar {
    width: 9px;
    height: 7px;
  }

  .group-msg-clients-list::-webkit-scrollbar-track {
    background: var(--msg-scroll-track);
    border-radius: 0;
    border-left: 1px solid #d2e1f1;
  }

  .group-msg-clients-list::-webkit-scrollbar-thumb {
    background: var(--msg-scroll-thumb);
    border-radius: 6px;
    border: 1px solid #eaf4ff;
  }

  .group-msg-clients-list::-webkit-scrollbar-thumb:hover {
    filter: brightness(0.94);
  }

  @media (max-width: 980px) {
    .group-msg-layout {
      grid-template-columns: 1fr;
      height: auto;
      gap: 10px;
    }

    .group-msg-panel:first-child,
    .group-msg-panel:last-child {
      padding: 0;
      border-radius: 12px;
      border-right: 1px solid #cfe2f5;
      border-left: 1px solid #cfe2f5;
    }

    .group-msg-panel-head-right {
      width: 100%;
      justify-content: space-between;
    }

    .group-msg-top-controls {
      align-items: flex-start;
    }

    .group-msg-top-control-row {
      justify-content: flex-start;
    }

    #group-message-drawer .drawer-body {
      overflow: auto;
      padding: 10px;
    }

    .group-msg-chat-body {
      flex: initial;
      min-height: 170px;
      max-height: 260px;
    }
  }
</style>

<div id="group-message-drawer" class="drawer-modal">
  <div class="drawer-content drawer-xl">
    <div class="drawer-header">
      <h3>
        <i class="fa-solid fa-paper-plane"></i>
        <span>Client Message</span>
      </h3>
      <button class="drawer-close" id="closeGroupMessageDrawer" aria-label="Close message drawer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="drawer-body" style="display:flex;flex-direction:column;gap:8px;min-height:0;">
      <div class="group-msg-layout">
        <section class="group-msg-panel">
          <div class="group-msg-panel-body">
            <div class="group-msg-search-row">
              <input type="text" id="groupMessageClientSearch" class="form-input" placeholder="Search clients...">
              <button type="button" class="btn btn-sm btn-neutral" id="groupMessageSelectAllVisibleBtn">Select All</button>
              <button type="button" class="btn btn-sm btn-neutral" id="groupMessageClearSelectionBtn">Clear</button>
            </div>

            <div id="groupMessageClientsList" class="group-msg-clients-list"></div>
          </div>
        </section>

        <section class="group-msg-panel">
          <div class="group-msg-panel-head">
            <div style="display:flex;flex-direction:column;min-width:0;">
              <div id="groupMessageTargetSummary" style="font-size: var(--ui-font-size-md, 13px);color:var(--color-slate-900);font-weight:700;">Sending to all clients</div>
            </div>
            <div class="group-msg-panel-head-right">
              <div class="group-msg-top-controls">
                <div class="group-msg-top-control-row">
                  <span class="group-msg-inline-title">Send To</span>
                  <div class="group-msg-controls">
                    <label class="group-msg-radio">
                      <input type="radio" name="groupMessageScope" value="client_only" checked>
                      <span>Client Only</span>
                    </label>
                    <label class="group-msg-radio">
                      <input type="radio" name="groupMessageScope" value="client_and_staff">
                      <span>Client + Staff</span>
                    </label>
                  </div>
                </div>

                <div class="group-msg-top-control-row">
                  <span class="group-msg-inline-title">Message Type</span>
                  <div class="group-msg-controls">
                    <label class="group-msg-radio">
                      <input type="radio" name="groupMessageVisibility" value="permanent" checked>
                      <span>Permanent</span>
                    </label>
                    <label class="group-msg-radio">
                      <input type="radio" name="groupMessageVisibility" value="temporary">
                      <span>Temporary</span>
                    </label>
                  </div>

                  <div class="form-group" id="groupMessageDurationWrap" style="display:none;margin:0;min-width:160px;">
                    <select id="groupMessageTemporaryDuration" class="form-select" aria-label="Temporary duration">
                      <option value="6h">6 hours</option>
                      <option value="12h">12 hours</option>
                      <option value="24h">24 hours</option>
                      <option value="2d">2 days</option>
                      <option value="3d">3 days</option>
                      <option value="7d">7 days</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="group-msg-panel-body" style="gap:10px;">
            <div id="groupMessageHistory" class="group-msg-chat-body">
              <div class="group-msg-history-state">Select a client from the left list to view message history.</div>
            </div>

            <div class="group-msg-composer">
              <textarea class="form-textarea" id="groupMessageText" rows="5" maxlength="2000" placeholder="Type your message..."></textarea>

              <div class="group-msg-action-row">
                <div id="groupMessageCounter" class="group-msg-counter">0 / 2000</div>
                <div class="group-msg-action-buttons">
                  <button type="button" class="btn btn-md btn-neutral group-msg-btn" id="cancelGroupMessageBtn">
                    <i class="fa-solid fa-xmark"></i> Cancel
                  </button>
                  <button type="button" class="btn btn-md btn-primary group-msg-btn" id="sendGroupMessageBtn">
                    <i class="fa-solid fa-paper-plane"></i> Send Message
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>
