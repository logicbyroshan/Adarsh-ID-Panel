{% load static %}
    <!-- View Client Modal (Side Modal) -->
    <div id="view-modal" class="drawer-modal">
      <div class="drawer-content">
        <div class="drawer-header">
          <h3><i class="fa-solid fa-user"></i> <span>Client Details</span></h3>
          <button class="drawer-close" id="closeViewModal" aria-label="Close view modal"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-body">

          <!-- Profile Avatar -->
          <div class="profile-upload-section flex flex-row items-center gap-4">
            <div id="viewClientAvatar">
              {% include 'partials/components/user-avatar.html' with role='client' size='large' %}
            </div>
            <div>
              <h2 id="viewClientName" class="text-sm font-semibold m-0" style="color:var(--color-slate-800);">-</h2>
              <span class="status-badge active" id="viewClientStatus" style="margin-top:4px;">Active</span>
            </div>
          </div>

          <!-- Client Information Section -->
          <div class="form-section">
            <div class="section-title"><i class="fa-solid fa-user"></i> Client Information</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input input-readonly" type="text" id="viewClientEmail" value="-" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input class="form-input input-readonly" type="text" id="viewClientPhone" value="-" disabled>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Address</label>
                <input class="form-input input-readonly" type="text" id="viewClientAddress" value="-" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <input class="form-input input-readonly" type="text" id="viewClientStatusText" value="-" disabled>
              </div>
            </div>
          </div>

          <!-- Timestamps Section -->
          <div class="form-section">
            <div class="section-title"><i class="fa-solid fa-calendar"></i> Timestamps</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Created At</label>
                <input class="form-input input-readonly" type="text" id="viewClientCreated" value="-" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">Updated At</label>
                <input class="form-input input-readonly" type="text" id="viewClientUpdated" value="-" disabled>
              </div>
            </div>
          </div>

          <!-- Permissions Section (read-only) -->
          {% if is_super_admin %}
          <div class="form-section" id="viewPermissionsSection">
            <div class="section-title"><i class="fa-solid fa-shield-halved"></i> Permissions</div>
            <div id="viewPermissionsGrid" class="permissions-section">
              <!-- Populated dynamically by JS -->
            </div>
          </div>
          {% endif %}

        </div>
        <div class="drawer-footer">
          <button type="button" class="btn btn-md btn-neutral" id="closeViewModalBtn"><i class="fa-solid fa-xmark"></i> Close</button>
          <button type="button" class="btn btn-md btn-primary" id="editFromViewBtn">
            <i class="fa-solid fa-pen"></i> Edit Client
          </button>
        </div>
      </div>
    </div>
