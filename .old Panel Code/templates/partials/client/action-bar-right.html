<div class="actions">
    <div class="btn-group"></div>

    <div class="btn-group">
        {% if can_manage_clients %}
        <button class="btn btn-md btn-primary" id="addClientBtn"><i class="fa-solid fa-plus"></i> Add</button>
        <button class="btn btn-md btn-neutral" id="editClientBtn" disabled><i class="fa-solid fa-pen"></i> Edit</button>
        {% endif %}
        <button class="btn btn-md btn-neutral" id="viewClientBtn" disabled><i class="fa-solid fa-eye"></i> View</button>
        {% if can_manage_clients %}
        <button class="btn btn-md btn-neutral" id="viewStaffBtn" disabled><i class="fa-solid fa-users"></i> Staff</button>
        {% endif %}
        {% if is_super_admin %}
        <button class="btn btn-md btn-danger" id="deleteClientBtn" disabled><i class="fa-solid fa-trash"></i> Delete</button>
        {% endif %}
        {% if can_manage_clients %}
        <button class="btn btn-md btn-warning" id="activeClientBtn" disabled><i class="fa-solid fa-toggle-on"></i> Active</button>
        {% endif %}
    </div>

    {% if is_super_admin or perm_idcard_setting_list %}
    <div class="btn-separator"></div>
    <div class="btn-group">
        <button class="btn btn-md btn-neutral" id="group-setting-btn" disabled title="Manage Group Settings">
            <i class="fa-solid fa-gear"></i>
            <span>Group Setting</span>
        </button>
        <button class="btn btn-md btn-primary" id="idcard-group-btn" disabled title="View ID Card Groups">
            <i class="fa-solid fa-id-card"></i>
            <span>ID Card Group</span>
        </button>
    </div>
    {% endif %}
</div>
