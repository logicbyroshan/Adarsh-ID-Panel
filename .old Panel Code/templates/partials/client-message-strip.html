<style>
  #clientNotificationStrip {
    display: none;
    margin: 12px 12px 0;
  }

  .client-notif-card {
    border: 1px solid var(--color-red-300);
    background: linear-gradient(135deg, var(--color-danger-dark) 0%, var(--color-red-700) 100%);
    color: var(--color-white);
    border-radius: 14px;
    box-shadow: 0 10px 24px rgba(153, 27, 27, 0.28);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .client-notif-card.cat-alert {
    background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
    border-color: #fdba74;
  }

  .client-notif-card.cat-announcement {
    background: linear-gradient(135deg, var(--color-warning-dark) 0%, var(--color-amber-700) 100%);
    border-color: var(--color-amber-300);
  }

  .client-notif-card.cat-update {
    background: linear-gradient(135deg, var(--color-emerald-600) 0%, var(--color-emerald-700) 100%);
    border-color: var(--color-green-300);
  }

  .client-notif-card.cat-general {
    background: linear-gradient(135deg, var(--color-blue-dark) 0%, var(--color-blue-700) 100%);
    border-color: var(--color-blue-300);
  }

  .client-notif-main {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    min-width: 0;
    flex: 1;
  }

  .client-notif-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.2);
    color: var(--color-white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: var(--ui-font-size-xl, 16px);
    flex-shrink: 0;
  }

  .client-notif-body {
    min-width: 0;
  }

  .client-notif-topline {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .client-notif-label {
    font-size: var(--ui-font-size-xs, 11px);
    font-weight: 800;
    color: rgba(255, 255, 255, 0.92);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .client-notif-counter {
    font-size: var(--ui-font-size-xs, 11px);
    color: var(--color-white);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.16);
    border: 1px solid rgba(255, 255, 255, 0.24);
    padding: 2px 8px;
    font-weight: 700;
  }

  .client-notif-title {
    margin-top: 2px;
    font-size: var(--ui-font-size-xl, 16px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--color-white);
  }

  .client-notif-text {
    margin-top: 4px;
    font-size: var(--ui-font-size-md, 13px);
    color: rgba(255, 255, 255, 0.95);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .client-notif-meta {
    margin-top: 4px;
    font-size: var(--ui-font-size-xs, 11px);
    color: rgba(255, 255, 255, 0.88);
    font-weight: 600;
    line-height: 1.35;
  }

  .client-notif-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .client-notif-btn {
    border: 1px solid rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.2);
    color: var(--color-white);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: var(--ui-font-size-sm, 12px);
    font-weight: 700;
    line-height: 1.2;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
  }

  .client-notif-btn:hover {
    background: rgba(255, 255, 255, 0.32);
    color: var(--color-white);
  }

  .client-notif-btn.mark-read {
    background: rgba(255, 255, 255, 0.3);
  }

  @media (max-width: 900px) {
    #clientNotificationStrip {
      margin-left: 8px;
      margin-right: 8px;
    }

    .client-notif-card {
      flex-direction: column;
      align-items: stretch;
    }

    .client-notif-actions {
      justify-content: flex-start;
    }
  }
</style>

<div id="clientNotificationStrip" aria-live="polite">
  <div class="client-notif-card cat-maintenance" id="clientNotificationCard">
    <div class="client-notif-main">
      <div class="client-notif-icon" aria-hidden="true">
        <i class="fa-solid fa-wrench" id="clientNotificationIcon"></i>
      </div>
      <div class="client-notif-body">
        <div class="client-notif-topline">
          <div class="client-notif-label" id="clientNotificationLabel">Maintenance</div>
          <div class="client-notif-counter" id="clientNotificationCounter">1 of 1</div>
        </div>
        <div class="client-notif-title" id="clientNotificationTitle"></div>
        <div class="client-notif-text" id="clientNotificationText"></div>
        <div class="client-notif-meta" id="clientNotificationMeta"></div>
      </div>
    </div>
    <div class="client-notif-actions">
      <a href="{% url 'notifications_page' %}" class="client-notif-btn" title="Open notifications page">Notifications</a>
      <button type="button" class="client-notif-btn" id="clientNotificationDismissBtn" title="Dismiss notification">Dismiss</button>
      <button type="button" class="client-notif-btn mark-read" id="clientNotificationReadBtn" title="Mark notification as read">Mark as Read</button>
    </div>
  </div>
</div>

<script>
(function() {
  var root = document.getElementById('clientNotificationStrip');
  if (!root) return;

  var cardEl = document.getElementById('clientNotificationCard');
  var iconEl = document.getElementById('clientNotificationIcon');
  var labelEl = document.getElementById('clientNotificationLabel');
  var titleEl = document.getElementById('clientNotificationTitle');
  var textEl = document.getElementById('clientNotificationText');
  var metaEl = document.getElementById('clientNotificationMeta');
  var counterEl = document.getElementById('clientNotificationCounter');
  var dismissBtn = document.getElementById('clientNotificationDismissBtn');
  var readBtn = document.getElementById('clientNotificationReadBtn');

  var allItems = [];
  var visibleItems = [];
  var dismissedIds = new Set();
  var currentIndex = 0;
  var rotateTimer = null;
  var pollTimer = null;

  var categoryIcons = {
    general: 'fa-circle-info',
    announcement: 'fa-bullhorn',
    update: 'fa-arrow-up-right-dots',
    maintenance: 'fa-wrench',
    alert: 'fa-triangle-exclamation'
  };

  function normalizeCategory(value) {
    var category = String(value || 'general').toLowerCase();
    if (categoryIcons[category]) return category;
    return 'general';
  }

  function getCsrf() {
    var meta = document.querySelector('meta[name="csrf-token"]');
    if (meta && meta.getAttribute('content')) return meta.getAttribute('content');
    var cookie = document.cookie.split(';').find(function(item) {
      return item.trim().indexOf('csrftoken=') === 0;
    });
    return cookie ? cookie.split('=')[1] : '';
  }

  function clearRotateTimer() {
    if (rotateTimer) {
      clearInterval(rotateTimer);
      rotateTimer = null;
    }
  }

  function startRotateTimer() {
    clearRotateTimer();
    if (visibleItems.length <= 1) return;
    rotateTimer = setInterval(function() {
      if (!visibleItems.length) return;
      currentIndex = (currentIndex + 1) % visibleItems.length;
      renderCurrent();
    }, 7000);
  }

  function syncVisibleItems(preferredId) {
    var currentId = preferredId;
    if (currentId == null && visibleItems[currentIndex]) {
      currentId = visibleItems[currentIndex].id;
    }

    visibleItems = allItems.filter(function(item) {
      return item && !dismissedIds.has(item.id);
    });

    if (!visibleItems.length) {
      currentIndex = 0;
      return;
    }

    if (currentId != null) {
      var idx = visibleItems.findIndex(function(item) { return item.id === currentId; });
      currentIndex = idx >= 0 ? idx : 0;
    } else {
      currentIndex = 0;
    }
  }

  function renderCurrent() {
    if (!visibleItems.length) {
      root.style.display = 'none';
      clearRotateTimer();
      return;
    }

    if (currentIndex >= visibleItems.length) currentIndex = 0;
    var item = visibleItems[currentIndex];
    if (!item) {
      root.style.display = 'none';
      clearRotateTimer();
      return;
    }

    var category = normalizeCategory(item.category);
    var iconClass = categoryIcons[category] || categoryIcons.general;
    var timeAgo = item.time_ago ? String(item.time_ago) + ' ago' : 'Unread notification';

    cardEl.className = 'client-notif-card cat-' + category;
    iconEl.className = 'fa-solid ' + iconClass;
    labelEl.textContent = item.category_display || category;
    titleEl.textContent = item.title || 'Notification';
    textEl.textContent = item.message || '';
    metaEl.textContent = timeAgo;

    if (visibleItems.length > 1) {
      counterEl.textContent = (currentIndex + 1) + ' of ' + visibleItems.length;
      counterEl.style.display = '';
    } else {
      counterEl.style.display = 'none';
    }

    root.style.display = '';
    startRotateTimer();
  }

  function fetchUnreadNotifications() {
    var currentItem = visibleItems[currentIndex];
    var currentId = currentItem ? currentItem.id : null;

    fetch('/api/notifications/list/?limit=10&unread_only=true', { credentials: 'same-origin' })
      .then(function(response) { return response.ok ? response.json() : null; })
      .then(function(data) {
        if (!data || !data.success) return;
        allItems = Array.isArray(data.notifications) ? data.notifications : [];
        syncVisibleItems(currentId);
        renderCurrent();
      })
      .catch(function() {});
  }

  function dismissCurrentNotification() {
    var currentItem = visibleItems[currentIndex];
    if (!currentItem) return;
    dismissedIds.add(currentItem.id);
    syncVisibleItems();
    renderCurrent();
  }

  function markCurrentAsRead() {
    var currentItem = visibleItems[currentIndex];
    if (!currentItem) return;

    fetch('/api/notifications/' + currentItem.id + '/read/', {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrf() },
      credentials: 'same-origin'
    }).then(function() {
      allItems = allItems.filter(function(item) { return item.id !== currentItem.id; });
      dismissedIds.delete(currentItem.id);
      syncVisibleItems();
      renderCurrent();
    }).catch(function() {});
  }

  if (dismissBtn) dismissBtn.addEventListener('click', dismissCurrentNotification);
  if (readBtn) readBtn.addEventListener('click', markCurrentAsRead);

  fetchUnreadNotifications();
  pollTimer = setInterval(fetchUnreadNotifications, 45000);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      fetchUnreadNotifications();
    }
  });

  window.addEventListener('beforeunload', function() {
    clearRotateTimer();
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  });
})();
</script>
