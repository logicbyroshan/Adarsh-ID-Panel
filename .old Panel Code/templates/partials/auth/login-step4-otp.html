<!-- Step 3: Forgot Password - OTP -->
<div class="login-step" id="step3">
    <div class="text-[#f8fafc] text-[17px] font-semibold mb-1.5 text-center">Verify your email</div>
    <div class="text-[#a0aec0] text-[13px] text-center mb-4">Enter the 6-digit code sent to your email</div>
    
    <div class="dev-otp" id="devOtpDisplay" style="display: none;">
        <span>Development Mode - OTP:</span>
        <strong id="devOtpValue">------</strong>
    </div>
    
    <div class="otp-inputs" id="otpInputs">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 1">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 2">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 3">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 4">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 5">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="OTP digit 6">
    </div>
    
    <button class="w-full py-2.5 border-none rounded text-sm font-semibold cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white shadow-[0_2px_8px_rgba(102,126,234,0.25)] hover:shadow-[0_4px_12px_rgba(102,126,234,0.35)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none" id="btnVerifyOtp">
        <span class="btn-text">Verify OTP</span>
        <div class="spinner" style="display: none;"></div>
    </button>
    
    <div class="resend-timer">
        <span id="resendText">Didn't receive code?</span>
        <button id="btnResendOtp" disabled>Resend in <span id="resendTimer">60</span>s</button>
    </div>
    
    <button class="w-full py-2.5 rounded text-sm font-semibold cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 bg-transparent text-[#a0aec0] border border-[rgba(102,126,234,0.2)] mt-2 hover:border-[#667eea] hover:text-[#f8fafc] hover:bg-[rgba(102,126,234,0.1)]" id="btnStep3Back">
        <i class="fa-solid fa-arrow-left"></i> Back to Login
    </button>
</div>
