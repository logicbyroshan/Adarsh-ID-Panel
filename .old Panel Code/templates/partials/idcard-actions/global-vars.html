<!-- Global Variables -->
{{ table.fields|json_script:"table-fields-data" }}
<script>
  var TABLE_ID = {{ table.id }};
  var TABLE_FIELDS = JSON.parse(document.getElementById('table-fields-data').textContent);
  var CURRENT_STATUS = '{{ current_status|default:"pending"|escapejs }}';
  var CLIENT_ID = {{ client.id }};
  var CLIENT_NAME = '{{ client.name|escapejs }}';
  var TABLE_NAME = '{{ table.name|escapejs }}';
  // Permission flags for JS-rendered elements
  var PERMS = {
    idcard_info: {{ perm_idcard_info|yesno:"true,false" }},
    idcard_edit: {{ perm_idcard_edit|yesno:"true,false" }},
    idcard_verify: {{ perm_idcard_verify|yesno:"true,false" }},
    idcard_approve: {{ perm_idcard_approve|yesno:"true,false" }},
    idcard_retrieve: {{ perm_idcard_retrieve|yesno:"true,false" }},
    idcard_delete_from_pool: {{ perm_idcard_delete_from_pool|yesno:"true,false" }},
    idcard_bulk_download: {{ perm_idcard_bulk_download|yesno:"true,false" }},
    idcard_download_image_rename_mode: {{ perm_idcard_download_image_rename_mode|yesno:"true,false" }},
    idcard_download_image_generate_mode: {{ perm_idcard_download_image_generate_mode|yesno:"true,false" }},
    reupload_idcard_image: {{ perm_reupload_idcard_image|yesno:"true,false" }} || {{ perm_idcard_bulk_reupload|yesno:"true,false" }},
    idcard_updated_at: {{ perm_idcard_updated_at|yesno:"true,false" }},
  };
  // Client / client_staff edit lock statuses for row/cell edit controls.
  var IS_CLIENT_USER = {{ is_client|yesno:"true,false" }} || {{ is_client_staff|yesno:"true,false" }};
  var CLIENT_READONLY_STATUSES = ['approved', 'download', 'reprint'];
  var REPRINT_MODAL_ENDPOINTS = {
    list: '{% url "reprintcard:api_reprint_list" table.id %}',
    requestCreate: '{% url "reprintcard:api_reprint_request_create" table.id %}',
    stepCounts: '{% url "reprintcard:api_reprint_step_counts" table.id %}'
  };
</script>
