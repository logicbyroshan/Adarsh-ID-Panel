{% load static %}
<link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}">

<!-- Tailwind CSS (primary) -->

<!-- Core CSS bundle (fonts + common + global-search) -->
<link rel="stylesheet" href="{% static 'dist/css/core.min.css' %}">
<!-- IDCard Actions CSS bundle -->
<link rel="stylesheet" href="{% static 'dist/css/idcard-actions.min.css' %}">
<link rel="stylesheet" href="{% static 'css/card-history-drawer.css' %}">

<!-- Shared Alpine runtime loader -->
