<div class="drawer-overlay client-message-overlay" id="clientMessageDrawerOverlay" aria-hidden="true"></div>

<aside
  class="side-drawer client-message-drawer"
  id="clientMessageDrawer"
  aria-hidden="true"
  data-messages-api="{% url 'client:api_messages_drawer' %}">
  <div class="drawer-header client-message-drawer-header">
    <h3>
      <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
      <span>Messages</span>
      <span class="client-message-header-pill" id="clientMessageUnreadPill">0 unread</span>
    </h3>
    <button type="button" class="drawer-close" id="clientMessageDrawerClose" aria-label="Close messages">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="drawer-body client-message-drawer-body" id="clientMessageDrawerBody">
    <div class="client-message-thread" id="clientMessageThread">
      <div class="client-message-thread-state">Loading messages...</div>
    </div>
  </div>

  <div class="drawer-footer client-message-drawer-footer">
    <button type="button" class="btn btn-sm btn-neutral" id="clientMessageMarkAllReadBtn">
      <i class="fa-solid fa-check-double"></i>
      Mark all read
    </button>
    <a href="{% url 'client:messages' %}" class="btn btn-sm btn-neutral">
      <i class="fa-solid fa-up-right-from-square"></i>
      Full page
    </a>
  </div>
</aside>
