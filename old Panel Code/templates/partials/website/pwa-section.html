{% load static %}
<section id="pwaInstallSection" class="pwa-install-section">
  <div class="pwa-install-copy">
    <h2>Install the app</h2>
    <p>Use the Android app for the best mobile experience.</p>
  </div>
  <div class="pwa-install-actions">
    <a id="downloadApkCta" href="{{ MOBILE_ANDROID_APP_DOWNLOAD_URL|default:'' }}" class="btn btn-primary">Download APK</a>
  </div>
</section>

<script>
  (function() {
    var section = document.getElementById('pwaInstallSection');
    var downloadBtn = document.getElementById('downloadApkCta');
    var apkDownloadUrl = '{{ MOBILE_ANDROID_APP_DOWNLOAD_URL|default:"" }}';

    if (apkDownloadUrl && downloadBtn) {
      downloadBtn.href = apkDownloadUrl;
    }

    if (!apkDownloadUrl && section) {
      section.style.display = 'none';
    }
  })();
</script>
