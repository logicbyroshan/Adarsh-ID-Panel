{% load static %}

<!-- Create/Edit Staff Modal -->
<div class="modal-backdrop" id="staffModal">
  <div class="modal-center modal-purple modal-wide">
    <div class="modal-header">
      <h3><i class="fa-solid fa-users-gear"></i> <span id="modalTitle">Add Operator</span></h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <form id="staffForm" onsubmit="handleSubmit(event)">
      <div class="modal-body">
        <input type="hidden" id="staffId" value="">

        <div class="modal-stepper modal-stepper--wide" aria-hidden="true">
          <div class="modal-step is-active" id="staffStep1Badge">
            <span class="modal-step-dot">1</span>
            <span class="modal-step-label">Basic Info</span>
          </div>
          <div class="modal-stepper-line"></div>
          <div class="modal-step" id="staffStep2Badge">
            <span class="modal-step-dot">2</span>
            <span class="modal-step-label">Access</span>
          </div>
        </div>

        <div id="staffStep1Panel" class="modal-step-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">First Name <span class="required">*</span></label>
              <input class="form-input" type="text" id="firstName" name="first_name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Last Name <span class="required">*</span></label>
              <input class="form-input" type="text" id="lastName" name="last_name" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email <span class="required">*</span></label>
            <input class="form-input" type="email" id="email" name="email" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-input" type="tel" id="phone" name="phone">
            </div>
            <div class="form-group">
              <label class="form-label" for="designation">Designation</label>
              <input class="form-input" type="text" id="designation" name="designation" value="Staff">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="department">Department</label>
            <input class="form-input" type="text" id="department" name="department">
          </div>
        </div>

        <div id="staffStep2Panel" class="modal-step-panel" style="display:none;">
          <div class="form-group">
            <label class="form-label">Assigned Clients</label>
            <div class="client-select-grid" id="clientsContainer">
              <!-- Populated by JS -->
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Permissions</label>
            <div id="permissionsContainer">
              <!-- Client Management -->
              <div class="permission-category">
                <h4><i class="fa-solid fa-users"></i> Client Management</h4>
                <div class="permission-grid" id="clientPermissions"></div>
              </div>

              <!-- ID Card Data -->
              <div class="permission-category">
                <h4><i class="fa-solid fa-id-card"></i> ID Card Data</h4>
                <div class="permission-grid" id="idcardPermissions"></div>
              </div>

              <!-- Settings & Bulk -->
              <div class="permission-category">
                <h4><i class="fa-solid fa-cog"></i> Settings & Operations</h4>
                <div class="permission-grid" id="settingsPermissions"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-md btn-neutral" onclick="closeModal()">Cancel</button>
        <button type="button" class="btn btn-md btn-neutral" id="staffStepBackBtn" style="display:none;">Back</button>
        <button type="button" class="btn btn-md btn-primary" id="staffStepNextBtn">Next</button>
        <button type="submit" class="btn btn-md btn-primary" id="submitBtn" style="display:none;">Create Staff</button>
      </div>
    </form>
  </div>
</div>
