{% comment %}
HTMX Configuration  -  Include this partial in every page template.
Loads HTMX 2.0 CDN and configures CSRF handling + global event hooks.

Usage:
  {% include 'partials/htmx-config.html' %}
{% endcomment %}

{% load static %}
<!-- HTMX 2.0  -  Partial-swap engine -->
<script defer src="{% static 'js/vendor/htmx.min.js' %}"></script>
<!-- HTMX Filter Bridge  -  server-side search/filter via htmx.ajax() -->
<script defer src="{% static 'js/core/htmx-filters.js' %}"></script>

<script>
  // -- HTMX global CSRF config --
  document.body.addEventListener('htmx:configRequest', function(evt) {
    var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value
                 || (document.cookie.match(/csrftoken=([^;]+)/) || [])[1];
    if (csrfToken) {
      evt.detail.headers['X-CSRFToken'] = csrfToken;
    }
  });

  // -- In-flight dedup guard for declarative hx-get buttons --
  // Prevents double-clicks on pagination/filter buttons from firing duplicate requests
  (function() {
    var _activeTargets = {};
    document.body.addEventListener('htmx:beforeRequest', function(evt) {
      var tgt = evt.detail.target?.id;
      if (tgt && _activeTargets[tgt]) {
        evt.preventDefault();           // cancel the duplicate request
        return;
      }
      if (tgt) _activeTargets[tgt] = true;
    });
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      var tgt = evt.detail.target?.id;
      if (tgt) delete _activeTargets[tgt];
    });
  })();

  // -- Global error handler  -  show toast on HTMX server errors --
  document.body.addEventListener('htmx:responseError', function(evt) {
    var status = evt.detail.xhr?.status;
    var msg = 'An error occurred. Please try again.';
    if (status === 403) msg = 'Permission denied.';
    else if (status === 404) msg = 'Resource not found.';
    else if (status >= 500) msg = 'Server error. Please try again later.';
    if (window.showToast) window.showToast(msg, 'error');
    else console.error(msg);
  });

  // -- Network failure handler  -  fires when HTMX cannot reach server --
  document.body.addEventListener('htmx:sendError', function(evt) {
    if (window.showToast) window.showToast('Network error. Check your connection and try again.', 'error');
    if (window.alpineHideLoading) window.alpineHideLoading();
  });

  // -- Session-expired handler  -  redirect to login on 401 instead of swapping --
  document.body.addEventListener('htmx:beforeSwap', function(evt) {
    var status = evt.detail.xhr?.status;
    if (status === 401) {
      evt.detail.shouldSwap = false;
      try {
        var data = JSON.parse(evt.detail.xhr.responseText);
        window.location.href = data.redirect || '/auth/login/';
      } catch(e) {
        window.location.href = '/auth/login/';
      }
      return;
    }
    // -- Full-page redirect guard --
    // If HTMX receives a full HTML page (redirect followed to a full page),
    // don't swap it into a partial container  -  do a full page navigation instead.
    // IMPORTANT: Only redirect if the page hasn't already navigated away.
    // Stale in-flight requests from a previous page must not hijack the current page.
    var responseText = evt.detail.xhr?.responseText || '';
    if (responseText.indexOf('<!DOCTYPE') !== -1 || responseText.indexOf('<!doctype') !== -1) {
      evt.detail.shouldSwap = false;
      // Guard: only redirect if the target element still exists in the current DOM.
      // If the target is gone, the user navigated away  -  ignore this stale response.
      var targetEl = evt.detail.target;
      if (targetEl && document.contains(targetEl)) {
        var finalUrl = evt.detail.xhr?.responseURL;
        if (finalUrl) {
          if (finalUrl !== window.location.href) {
            window.location.href = finalUrl;
          }
        } else {
          // Avoid forced full reload here to keep partial flows stable.
          // Let the user continue and surface a soft warning instead.
          if (window.showToast) {
            window.showToast('A full-page response was returned for a partial request. Please retry.', 'warning');
          }
          console.warn('HTMX full-document response without responseURL; skipped forced reload.');
        }
      }
    }
  });

  // -- Global loading indicator integration with Alpine --
  document.body.addEventListener('htmx:beforeRequest', function(evt) {
    if (!evt.detail.elt.hasAttribute('hx-indicator')) {
      if (window.alpineShowLoading) window.alpineShowLoading();
    }
  });
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (!evt.detail.elt.hasAttribute('hx-indicator')) {
      if (window.alpineHideLoading) window.alpineHideLoading();
    }
  });

  // -- Global table skeleton loader for HTMX swaps --
  (function() {
    function resolveTarget(raw) {
      if (!raw) return null;
      if (raw instanceof Element) return raw;
      if (typeof raw === 'string') {
        try {
          return document.querySelector(raw);
        } catch (e) {
          return null;
        }
      }
      return null;
    }

    function getTarget(evt) {
      if (!evt || !evt.detail) return null;

      var direct = resolveTarget(evt.detail.target);
      if (direct) return direct;

      var reqEl = resolveTarget(evt.detail.elt);
      if (reqEl && reqEl.getAttribute) {
        var hxTarget = reqEl.getAttribute('hx-target');
        var resolvedHxTarget = resolveTarget(hxTarget);
        if (resolvedHxTarget) return resolvedHxTarget;
      }

      return null;
    }

    function isTableTarget(target) {
      if (!target || !(target instanceof Element)) return false;
      if (target.hasAttribute('data-table-skeleton')) return true;
      if (target.querySelector('table')) return true;
      var id = String(target.id || '').toLowerCase();
      if (!id) return false;
      return id.indexOf('table') !== -1 || id.indexOf('grid') !== -1;
    }

    function detectCols(target) {
      var ths = target.querySelectorAll('thead th');
      var count = ths ? ths.length : 0;
      if (!count) {
        var firstRowCells = target.querySelectorAll('tbody tr:first-child td');
        count = firstRowCells ? firstRowCells.length : 0;
      }
      if (!count) count = 6;
      return Math.max(3, Math.min(12, count));
    }

    function skeletonHtml(cols, rows) {
      var html = '<div class="table-skeleton-shell">';
      html += '<div class="table-skeleton-head">';
      var c;
      for (c = 0; c < cols; c += 1) {
        html += '<span class="table-skeleton-block table-skeleton-th"></span>';
      }
      html += '</div>';
      var r;
      for (r = 0; r < rows; r += 1) {
        html += '<div class="table-skeleton-row">';
        for (c = 0; c < cols; c += 1) {
          html += '<span class="table-skeleton-block table-skeleton-td"></span>';
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function showTableSkeleton(target) {
      if (!isTableTarget(target)) return;
      if (target.querySelector(':scope > .table-skeleton-overlay')) return;

      var cols = detectCols(target);
      var overlay = document.createElement('div');
      overlay.className = 'table-skeleton-overlay';
      overlay.setAttribute('aria-hidden', 'true');
      overlay.style.setProperty('--sk-cols', String(cols));
      overlay.innerHTML = skeletonHtml(cols, 8);

      target.classList.add('table-skeleton-host', 'table-skeleton-loading');
      target.appendChild(overlay);
    }

    function hideTableSkeleton(target) {
      if (!target || !(target instanceof Element)) return;
      var overlay = target.querySelector(':scope > .table-skeleton-overlay');
      if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      target.classList.remove('table-skeleton-loading');
    }

    document.body.addEventListener('htmx:beforeRequest', function(evt) {
      showTableSkeleton(getTarget(evt));
    });

    document.body.addEventListener('htmx:afterSwap', function(evt) {
      hideTableSkeleton(getTarget(evt));
    });

    document.body.addEventListener('htmx:afterRequest', function(evt) {
      hideTableSkeleton(getTarget(evt));
    });

    document.body.addEventListener('htmx:responseError', function(evt) {
      hideTableSkeleton(getTarget(evt));
    });

    document.body.addEventListener('htmx:sendError', function(evt) {
      hideTableSkeleton(getTarget(evt));
    });
  })();

  // -- Handle HX-Trigger: showToast from server --
  document.body.addEventListener('showToast', function(evt) {
    if (window.showToast && evt.detail) {
      window.showToast(evt.detail.message || 'Done', evt.detail.type || 'success');
    }
  });

  // -- Safety net: reinitialize Alpine trees inside swapped elements --
  // Currently no Alpine directives live inside swap targets, but if any
  // are added in the future, this ensures they get initialized properly.
  document.body.addEventListener('htmx:afterSettle', function(evt) {
    if (window.Alpine && evt.detail.target) {
      Alpine.initTree(evt.detail.target);
    }
  });
</script>

<!-- HTMX loading indicator (small bar under pagination) -->
<style>
  .htmx-indicator { display: none; }
  .htmx-request .htmx-indicator,
  .htmx-request.htmx-indicator { display: block; }

  /* Legacy thin loader is replaced by table skeletons. */
  .htmx-table-loader {
    display: none !important;
  }

  .table-skeleton-host {
    position: relative;
  }
  .table-skeleton-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    min-height: 220px;
    background: var(--surface, var(--color-white));
    border-radius: 10px;
    padding: 10px;
    border: 1px solid var(--color-gray-200);
  }
  .table-skeleton-loading .table-wrapper,
  .table-skeleton-loading table {
    visibility: hidden;
  }
  .table-skeleton-shell {
    display: grid;
    gap: 10px;
  }
  .table-skeleton-head,
  .table-skeleton-row {
    display: grid;
    grid-template-columns: repeat(var(--sk-cols, 6), minmax(0, 1fr));
    gap: 10px;
  }
  .table-skeleton-head { --sk-h: 16px; }
  .table-skeleton-row { --sk-h: 22px; }
  .table-skeleton-block {
    display: block;
    width: 100%;
    height: var(--sk-h);
    border-radius: 8px;
    background: linear-gradient(90deg, #eef2f7 0%, #f6f8fb 50%, #eef2f7 100%);
    background-size: 220% 100%;
    animation: table-skeleton-shimmer 1.1s linear infinite;
  }
  .table-skeleton-th {
    height: 14px;
    border-radius: 6px;
  }
  .table-skeleton-td:nth-child(3n) {
    width: 86%;
  }
  .table-skeleton-td:nth-child(4n) {
    width: 72%;
  }
  @keyframes table-skeleton-shimmer {
    from { background-position: 100% 0; }
    to { background-position: -100% 0; }
  }
  /* Disable pointer events on buttons while HTMX is loading */
  .htmx-request .pagination-btn,
  .htmx-request .page-num,
  .htmx-request .dropdown-option[hx-get],
  .pagination-btn.htmx-request,
  .page-num.htmx-request,
  .dropdown-option.htmx-request {
    pointer-events: none;
    opacity: 0.6;
  }
</style>
