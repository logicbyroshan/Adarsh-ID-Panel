{% load static %}
<!-- === DASHBOARD NOTIFICATION BAR === -->
<div class="notif-bar" id="dashboardNotifBar">
  <div class="notif-bar-header">
    <div class="notif-bar-title">
      <i class="fa-solid fa-bell"></i>
      <span>Notifications</span>
      <span class="notif-bar-badge" id="notifBarCount" style="display:none;">0</span>
    </div>
    <a href="{% url 'notifications_page' %}" class="notif-bar-link">
      Open Notifications
    </a>
  </div>
  <div class="notif-bar-list" id="notifBarList">
    <div class="notif-bar-empty">
      <i class="fa-solid fa-circle-check"></i> You're all caught up!
    </div>
  </div>
</div>

<style>
.notif-bar {
  --notif-bar-font-scale: 1.4;
  background: var(--color-white);
  border: 1px solid var(--color-gray-200);
  margin-bottom: 16px;
  overflow: hidden;
}
.notif-bar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(var(--primary-rgb), 0.15);
  background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.06) 0%, rgba(118, 75, 162, 0.04) 100%);
}
.notif-bar-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: calc(18px * var(--notif-bar-font-scale));
  font-weight: 600;
  color: var(--color-slate-800);
}
.notif-bar-title i { color: var(--color-primary); font-size: calc(20px * var(--notif-bar-font-scale)); }
.notif-bar-badge {
  font-size: calc(14px * var(--notif-bar-font-scale));
  font-weight: 700;
  background: var(--color-danger);
  color: var(--color-white);
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 24px;
  text-align: center;
  line-height: 20px;
}
.notif-bar-link {
  font-size: calc(17px * var(--notif-bar-font-scale));
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.notif-bar-link:hover { text-decoration: underline; }
.notif-bar-list {
  max-height: 140px;
  overflow-y: auto;
}
.notif-bar-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--color-slate-100);
  transition: background .1s;
  cursor: pointer;
}
.notif-bar-item:last-child { border-bottom: none; }
.notif-bar-item:hover { background: #f8fafc; }
.notif-bar-item.unread { background: var(--color-blue-50); }
.notif-bar-item.unread:hover { background: var(--color-blue-100); }
.notif-bar-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.notif-bar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.notif-bar-mark-btn {
  cursor: pointer;
  border: 1px solid var(--color-gray-300);
  background: var(--color-white);
  color: var(--color-gray-500);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: calc(14px * var(--notif-bar-font-scale));
  line-height: 1.4;
  transition: all .15s;
  white-space: nowrap;
}
.notif-bar-mark-btn:hover {
  background: var(--color-success);
  color: var(--color-white);
  border-color: var(--color-success);
}
.notif-bar-dismiss-btn {
  cursor: pointer;
  border: 1px solid var(--color-gray-300);
  background: var(--color-white);
  color: var(--color-gray-500);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: calc(13px * var(--notif-bar-font-scale));
  line-height: 1.4;
  transition: all .15s;
  white-space: nowrap;
}
.notif-bar-dismiss-btn:hover {
  background: var(--color-slate-200);
}
.notif-bar-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: calc(17px * var(--notif-bar-font-scale));
  margin-top: 2px;
}
.notif-bar-icon.general    { background: var(--color-blue-50); color: var(--color-blue); }
.notif-bar-icon.announcement { background: var(--color-amber-100); color: var(--color-warning-dark); }
.notif-bar-icon.update     { background: var(--color-emerald-50); color: var(--color-emerald-600); }
.notif-bar-icon.maintenance { background: var(--color-red-50); color: var(--color-danger-dark); }
.notif-bar-icon.alert      { background: var(--color-red-50); color: var(--color-danger); }
.notif-bar-body { flex: 1; min-width: 0; }
.notif-bar-body-title {
  font-size: calc(20px * var(--notif-bar-font-scale));
  font-weight: 600;
  color: var(--color-slate-800);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.notif-bar-body-msg {
  font-size: calc(18px * var(--notif-bar-font-scale));
  color: var(--color-slate-500);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.notif-bar-time {
  font-size: calc(17px * var(--notif-bar-font-scale));
  color: var(--color-slate-400);
  white-space: nowrap;
}
.notif-bar-empty {
  padding: 16px;
  text-align: center;
  font-size: calc(20px * var(--notif-bar-font-scale));
  color: var(--color-slate-400);
}
.notif-bar-empty i { color: var(--color-success); margin-right: 4px; }

@media (max-width: 640px) {
  .notif-bar-list { max-height: 100px; }
}
</style>

<script>
(function() {
  const notificationsPageUrl = "{% url 'notifications_page' %}";

  function loadNotifBar() {
    fetch('/api/notifications/list/?limit=5&unread_only=true')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data || !data.success) return;
        const list = document.getElementById('notifBarList');
        const badge = document.getElementById('notifBarCount');
        const items = data.notifications || [];
        const unread = data.unread_count || 0;

        if (badge) {
          if (unread > 0) {
            badge.textContent = unread;
            badge.style.display = '';
          } else {
            badge.style.display = 'none';
          }
        }

        if (!items.length) {
          list.innerHTML = '<div class="notif-bar-empty"><i class="fa-solid fa-circle-check"></i> You\'re all caught up!</div>';
          return;
        }

        const categoryIcons = {
          general: 'fa-circle-info',
          announcement: 'fa-bullhorn',
          update: 'fa-arrow-up-right-dots',
          maintenance: 'fa-wrench',
          alert: 'fa-triangle-exclamation',
        };

        list.innerHTML = items.map(n => {
          const icon = categoryIcons[n.category] || 'fa-bell';
          const cat = n.category || 'general';
          const unreadCls = n.is_read ? '' : ' unread';
          const msgPreview = (n.message || '').length > 80 ? n.message.substring(0, 80) + '...' : (n.message || '');
          const dismissBtn = `<button class="notif-bar-dismiss-btn" onclick="event.stopPropagation();dismissNotifFromBar(this.closest('.notif-bar-item'))" title="Dismiss">Dismiss</button>`;
          const markBtn = n.is_read ? '' : `<button class="notif-bar-mark-btn" onclick="event.stopPropagation();markNotifRead(${n.id}, this.closest('.notif-bar-item'))" title="Mark as read">Mark as Read</button>`;
          return `<div class="notif-bar-item${unreadCls}" data-notif-id="${n.id}" onclick="openNotifFromBar(${n.id}, this)" onkeydown="handleNotifBarKeydown(event, ${n.id}, this)" tabindex="0" role="button" aria-label="Open notification">
            <div class="notif-bar-icon ${cat}"><i class="fa-solid ${icon}"></i></div>
            <div class="notif-bar-body">
              <div class="notif-bar-body-title">${escNotif(n.title)}</div>
              <div class="notif-bar-body-msg">${escNotif(msgPreview)}</div>
            </div>
            <div class="notif-bar-right">
              <div class="notif-bar-time">${n.time_ago || ''}</div>
              <div class="notif-bar-actions">
                ${dismissBtn}
                ${markBtn}
              </div>
            </div>
          </div>`;
        }).join('');
      })
      .catch(() => {});
  }

  function escNotif(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function postMarkRead(id) {
    return fetch(`/api/notifications/${id}/read/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrf() },
    });
  }

  function buildNotifTargetUrl(notificationId) {
    try {
      const targetUrl = new URL(notificationsPageUrl, window.location.origin);
      targetUrl.searchParams.set('highlight', String(notificationId));
      return `${targetUrl.pathname}${targetUrl.search}${targetUrl.hash}`;
    } catch (_err) {
      const separator = notificationsPageUrl.indexOf('?') === -1 ? '?' : '&';
      return `${notificationsPageUrl}${separator}highlight=${encodeURIComponent(String(notificationId))}`;
    }
  }

  window.markNotifRead = function(id, el) {
    postMarkRead(id).then(() => {
      // Update badge count
      const badge = document.getElementById('notifBarCount');
      if (badge && el && el.classList.contains('unread')) {
        let c = parseInt(badge.textContent) - 1;
        if (c <= 0) { badge.style.display = 'none'; c = 0; }
        else badge.textContent = c;
      }
      // Remove item from list with fade
      if (el) {
        el.style.transition = 'opacity 0.25s';
        el.style.opacity = '0';
        setTimeout(() => {
          el.remove();
          // If list is now empty, show empty state
          const list = document.getElementById('notifBarList');
          if (list && !list.querySelector('.notif-bar-item')) {
            list.innerHTML = '<div class="notif-bar-empty"><i class="fa-solid fa-circle-check"></i> You\'re all caught up!</div>';
          }
        }, 260);
      }
    }).catch(() => {});
  };

  window.dismissNotifFromBar = function(el) {
    if (!el) return;
    el.style.transition = 'opacity 0.2s';
    el.style.opacity = '0';
    setTimeout(() => {
      el.remove();
      const list = document.getElementById('notifBarList');
      if (list && !list.querySelector('.notif-bar-item')) {
        list.innerHTML = '<div class="notif-bar-empty"><i class="fa-solid fa-circle-check"></i> You\'re all caught up!</div>';
      }
    }, 220);
  };

  window.openNotifFromBar = function(id, el) {
    postMarkRead(id)
      .finally(() => {
        window.location.href = buildNotifTargetUrl(id);
      });
  };

  window.handleNotifBarKeydown = function(event, id, el) {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    event.preventDefault();
    openNotifFromBar(id, el);
  };

  function getCsrf() {
    const c = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
    if (c) return c.split('=')[1];
    const m = document.querySelector('meta[name="csrf-token"]');
    return m ? m.getAttribute('content') : '';
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadNotifBar);
  } else {
    loadNotifBar();
  }
})();
</script>
