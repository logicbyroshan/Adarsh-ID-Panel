<div class="dashboard-card dashboard-section-tabs-card">
    <div class="dashboard-card-header">
        <h3><i class="fa-solid fa-compass"></i> Dashboard Sections</h3>
    </div>
    <div class="dashboard-card-body p-0">
        <div class="cards-overview dashboard-section-tabs">
            <button type="button" class="card-overview-item dashboard-tab-item is-active" data-dashboard-tab="recent-clients" aria-pressed="true">
                <div class="card-overview-left">
                    <div class="card-overview-icon clients">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="card-overview-label">Recent Clients</div>
                </div>
                <div class="card-overview-value" id="dashboardTabCountRecentClients">0</div>
            </button>

            <button type="button" class="card-overview-item dashboard-tab-item" data-dashboard-tab="recent-reprints" aria-pressed="false">
                <div class="card-overview-left">
                    <div class="card-overview-icon">
                        <i class="fa-solid fa-print"></i>
                    </div>
                    <div class="card-overview-label">Recent Reprints</div>
                </div>
                <div class="card-overview-value" id="dashboardTabCountReprint">0</div>
            </button>

            <button type="button" class="card-overview-item dashboard-tab-item" data-dashboard-tab="recent-updates" aria-pressed="false">
                <div class="card-overview-left">
                    <div class="card-overview-icon verified">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </div>
                    <div class="card-overview-label">Recent Updates</div>
                </div>
                <div class="card-overview-value" id="dashboardTabCountRecentUpdates">0</div>
            </button>


        </div>
    </div>
</div>
