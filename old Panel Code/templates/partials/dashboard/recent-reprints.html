{% comment %}
Reprint Overview Card - Admin Dashboard
Loaded dynamically via api_reprint_overview.
{% endcomment %}

<div class="dashboard-card">
  <div class="dashboard-card-header overview-header">
    <h3>
      <i class="fa-solid fa-arrows-rotate"></i> Recent Reprints
      <span class="count-badge pending" id="reprintOverviewTotalRequested" style="margin-left:8px;">0</span>
    </h3>
    <div class="overview-search-inline">
      <div class="recent-updates-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="reprintOverviewSearch"
          class="recent-updates-search-input"
          placeholder="Search reprint client or table"
          autocomplete="off"
        >
      </div>
    </div>
  </div>
  <div class="dashboard-card-body tall-body p-0 table-scroll-body">
    <div class="recent-table-wrapper dashboard-scroll-table-wrapper">
      <table class="recent-table dashboard-scroll-table recent-table-3col">
        <thead>
          <tr>
            <th scope="col">Client</th>
            <th scope="col" class="text-center recent-updates-sortable" data-overview-sort-scope="reprint" data-overview-sort-key="pending" aria-sort="none" tabindex="0" title="Sort by highest request list count. Click again to clear sorting.">Request List <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
            <th scope="col" class="text-center recent-updates-sortable" data-overview-sort-scope="reprint" data-overview-sort-key="verified" aria-sort="none" tabindex="0" title="Sort by highest confirmed count. Click again to clear sorting.">Confirmed <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
          </tr>
        </thead>
        <tbody id="reprintOverviewBody">
          <tr class="dashboard-table-skeleton-row">
            <td><span class="dash-skeleton dash-skeleton-line" style="width: 74%;"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          </tr>
          <tr class="dashboard-table-skeleton-row">
            <td><span class="dash-skeleton dash-skeleton-line" style="width: 63%;"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          </tr>
          <tr class="dashboard-table-skeleton-row">
            <td><span class="dash-skeleton dash-skeleton-line" style="width: 70%;"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
            <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
