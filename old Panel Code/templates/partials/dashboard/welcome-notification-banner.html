<!-- Welcome Banner with Sliding Notifications (shared partial) -->
<style>
  /* Emphasize maintenance banner: larger title and taller bar for visibility. */
  .client-welcome-banner.notif-cat-maintenance .welcome-slide {
    min-height: 86px;
    padding-top: 18px;
    padding-bottom: 18px;
  }

  .client-welcome-banner.notif-cat-maintenance .welcome-notif-title {
    font-size: var(--ui-font-size-5xl, 28px);
    line-height: 1.05;
    font-weight: 800;
  }

  @media (max-width: 768px) {
    .client-welcome-banner.notif-cat-maintenance .welcome-slide {
      min-height: 76px;
      padding-top: 14px;
      padding-bottom: 14px;
    }

    .client-welcome-banner.notif-cat-maintenance .welcome-notif-title {
      font-size: var(--ui-font-size-3xl-lg, 22px);
    }
  }
</style>

<div class="client-welcome-banner" id="clientWelcomeBanner">
  <div class="welcome-slide welcome-slide-active" id="welcomeDefaultSlide">
    <div class="welcome-text">
      <h2>Welcome back, {{ user.get_full_name|default:user.username }}!</h2>
      <p>Here's what's happening with your ID card system today.</p>
    </div>
    <div class="welcome-right">
      <div class="welcome-date">
        <div class="date" id="welcomeDate">Loading...</div>
        <div class="time" id="welcomeTime">--:--:--</div>
      </div>
    </div>
  </div>
  <div class="welcome-slide" id="welcomeNotifSlide" style="display:none;">
    <div class="welcome-notif-content" id="welcomeNotifContent"></div>
    <div class="welcome-notif-actions">
      <button class="welcome-notif-dismiss" id="welcomeNotifDismiss" title="Dismiss">
        Dismiss
      </button>
      <button class="welcome-notif-markread" id="welcomeNotifMarkRead" title="Mark as Read">
        Mark as Read
      </button>
    </div>
  </div>
  <div class="welcome-notif-dots" id="welcomeNotifDots" style="display:none;"></div>
</div>
