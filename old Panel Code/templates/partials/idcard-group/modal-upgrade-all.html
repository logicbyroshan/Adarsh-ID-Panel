<!-- Upgrade All Classes Confirmation Modal -->
<div id="upgradeAllModal" class="center-modal-overlay center-modal-theme-amber"
  x-show="isUpgradeAllModalOpen" x-transition.opacity
     style="display:none">
  <div class="center-modal-card center-modal-card--compact" @click.stop
    x-show="isUpgradeAllModalOpen" x-transition.scale.origin.center>
    <!-- Header -->
    <div class="center-modal-header">
      <h3><i class="fa-solid fa-arrow-up"></i> Upgrade All Classes</h3>
      <button type="button" class="center-modal-header-close" @click="closeModal" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Body -->
    <div class="center-modal-body-area">
    <div class="confirm-flow">
      <div class="modal-stepper" aria-hidden="true">
        <div class="modal-step is-active">
          <span class="modal-step-dot">1</span>
          <span class="modal-step-label">Review</span>
        </div>
        <div class="modal-stepper-line"></div>
        <div class="modal-step is-active">
          <span class="modal-step-dot">2</span>
          <span class="modal-step-label">Verify</span>
        </div>
      </div>

      <div class="confirm-flow-meta">
        <p>Table: <strong id="upgradeAllTableName"></strong></p>
        <p>This will upgrade the class value of <strong id="upgradeAllCount"></strong> cards in the <strong>Download list</strong> to the next level (e.g. V &rarr; VI).</p>
      </div>

      <div class="alert-box alert-box--warning">
        <p class="alert-box-heading">
          <i class="fa-solid fa-circle-exclamation"></i> Please Confirm
        </p>
        <ul class="alert-box-list">
          <li>Every eligible card in Download will be upgraded</li>
          <li>This action cannot be undone</li>
        </ul>
      </div>

      <div class="confirm-flow-verify">
        <p class="verify-hint">Type this code to confirm:</p>
        <div class="center-modal-code" id="upgradeAllCode"></div>
        <div class="confirm-code-input-wrap" id="upgradeAllCodeWrap" onclick="document.getElementById('upgradeAllCodeInput').focus()">
          <div class="confirm-code-boxes" id="upgradeAllCodeBoxes" aria-hidden="true">
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
            <span class="confirm-code-box"></span>
          </div>
          <input type="text" id="upgradeAllCodeInput" class="center-modal-input confirm-code-input-hidden" maxlength="10" autocomplete="off" inputmode="numeric" pattern="[0-9]{10}" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
        </div>
      </div>
    </div>
    </div><!-- end body-area -->
    <!-- Footer -->
    <div class="center-modal-footer-area">
      <button id="upgradeAllCancel" class="btn btn-md btn-neutral" @click="closeModal">
        <i class="fa-solid fa-xmark"></i> Cancel
      </button>
      <button id="upgradeAllConfirm" class="btn btn-md btn-warning" disabled>
        <i class="fa-solid fa-arrow-up"></i> Upgrade All Classes
      </button>
    </div>
  </div>
</div>
