<div class="form-section" id="staff-permissions-section">
    <div class="permission-header">
        <i class="fa-solid fa-shield-halved"></i> User Permission
    </div>

    <div class="permission-category">
        <div class="category-title">
            <i class="fa-solid fa-list"></i> ID Card List Tabs
        </div>
        <div class="permissions-grid">
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-pending-list"><span class="toggle-slider"></span></label><span class="permission-label">Pending List</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-verified-list"><span class="toggle-slider"></span></label><span class="permission-label">Verified List</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-pool-list"><span class="toggle-slider"></span></label><span class="permission-label">Pool List</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-approved-list"><span class="toggle-slider"></span></label><span class="permission-label">Approved List</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-download-list"><span class="toggle-slider"></span></label><span class="permission-label">Download List</span></div>
        </div>
    </div>

    <div class="permission-category">
        <div class="category-title">
            <i class="fa-solid fa-file-arrow-down"></i> Export &amp; Download
        </div>
        <div class="permissions-grid">
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-bulk-download"><span class="toggle-slider"></span></label><span class="permission-label">Download PDF / Export</span></div>
        </div>
    </div>

    <div class="permission-category">
        <div class="category-title">
            <i class="fa-solid fa-id-card"></i> Card Actions
        </div>
        <div class="permissions-grid">
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-add"><span class="toggle-slider"></span></label><span class="permission-label">Add Card</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-edit"><span class="toggle-slider"></span></label><span class="permission-label">Edit Card</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-delete"><span class="toggle-slider"></span></label><span class="permission-label">Delete Card</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-info"><span class="toggle-slider"></span></label><span class="permission-label">View Card Info</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-verify"><span class="toggle-slider"></span></label><span class="permission-label">Verify Card</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-updated-at"><span class="toggle-slider"></span></label><span class="permission-label">Last Updated &amp; Updated By</span></div>
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-idcard-retrieve"><span class="toggle-slider"></span></label><span class="permission-label">Retrieve from Pool</span></div>
        </div>
    </div>

    <div class="permission-category">
        <div class="category-title">
            <i class="fa-solid fa-mobile-screen"></i> App &amp; Access
        </div>
        <div class="permissions-grid">
            <div class="permission-row"><label class="toggle-switch"><input type="checkbox" id="perm-mobile-app"><span class="toggle-slider"></span></label><span class="permission-label">Mobile App Login</span></div>
        </div>
    </div>
</div>
