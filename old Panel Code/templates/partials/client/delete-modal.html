    <!-- Delete Confirmation Modal (Center Modal) -->
    <div id="delete-modal" class="modal-backdrop"
         x-show="activeModal === 'delete'" x-transition.opacity
         style="display:none">
      <div class="modal-center modal-danger modal-compact" @click.stop
           x-show="activeModal === 'delete'" x-transition.scale.origin.center>
        <div class="modal-header">
          <h3><i class="fa-solid fa-triangle-exclamation"></i> Confirm Delete</h3>
          <button class="modal-close" type="button" aria-label="Close delete modal"
                  @click="closeModal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-body-centered">
            <div class="modal-icon-circle modal-icon-circle--danger">
              <i class="fa-solid fa-trash-can"></i>
            </div>
            <p class="modal-body-title">Delete Client?</p>
            <p class="modal-body-subtitle">
              You are about to delete <strong id="deleteClientName">this client</strong>.
            </p>
            <div class="alert-box alert-box--danger">
              <p class="alert-box-heading">
                <i class="fa-solid fa-circle-exclamation"></i> Warning
              </p>
              <ul class="alert-box-list">
                <li>Deletion is only allowed for clients with <strong>no active data</strong></li>
                <li>All groups, cards, and media must be deleted first</li>
                <li>This action cannot be undone</li>
              </ul>
            </div>
            <!-- 10-digit confirmation code -->
            <div class="verify-section">
              <p class="verify-hint" style="text-align:center;">Type this code to confirm:</p>
              <div class="verify-code"
                   x-text="deleteCode || '----------'"></div>
              <div class="confirm-code-input-wrap"
                   :class="{ 'is-valid': deleteCodeInput.length===10 && deleteCodeInput===deleteCode, 'is-invalid': deleteCodeInput.length===10 && deleteCodeInput!==deleteCode }"
                   @click="$refs.clientDeleteCodeInput.focus()">
                <div class="confirm-code-boxes" aria-hidden="true">
                  <template x-for="idx in 10" :key="'client-delete-box-' + idx">
                    <span class="confirm-code-box"
                          :class="{ 'is-filled': !!(deleteCodeInput[idx - 1]), 'is-active': deleteCodeInput.length < 10 && deleteCodeInput.length === (idx - 1) }"
                          x-text="deleteCodeInput[idx - 1] || ''"></span>
                  </template>
                </div>
                <input type="text" x-model="deleteCodeInput"
                    x-ref="clientDeleteCodeInput"
                    maxlength="10"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    autocomplete="off"
                    class="verify-input confirm-code-input-hidden"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                >
              </div>
              <p class="verify-error"
                 x-show="deleteCodeInput.length===10 && deleteCodeInput!==deleteCode">
                <i class="fa-solid fa-circle-xmark"></i> Incorrect code. Please try again.
              </p>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-md btn-neutral" type="button"
                  @click="closeModal">
            <i class="fa-solid fa-xmark"></i> Cancel
          </button>
          <button class="btn btn-md btn-danger" id="confirmDeleteBtn" type="button"
                  :disabled="!(deleteCodeInput && deleteCodeInput.length===10 && deleteCodeInput===deleteCode)">
            <i class="fa-solid fa-trash-can"></i> Delete
          </button>
        </div>
      </div>
    </div>
