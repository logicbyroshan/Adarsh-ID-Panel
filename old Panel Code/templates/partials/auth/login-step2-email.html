<!-- Step 1: Email, Username, or Phone -->
<div class="login-step active" id="step1">
    <div class="text-[#f8fafc] text-[17px] font-semibold mb-1.5 text-center">Enter your email, username, or phone</div>
    <div class="text-[#a0aec0] text-[13px] text-center mb-4" id="step2Subtitle">We'll check if you have an account</div>
    
    <div class="mb-3.5">
        <label class="block text-[#a0aec0] text-xs font-medium mb-1.5">Email, Username, or Phone</label>
        <div class="relative">
            <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-[#718096] text-[15px]"></i>
            <input type="text" id="emailInput" placeholder="Enter your email, username, or phone" autocomplete="username" class="w-full py-2.5 px-2.5 pl-10 bg-[rgba(102,126,234,0.05)] border border-[rgba(102,126,234,0.2)] text-[#f8fafc] text-sm transition-all duration-200 placeholder:text-[#718096] focus:outline-none focus:border-[#667eea] focus:bg-[rgba(102,126,234,0.1)] focus:ring-2 focus:ring-[rgba(102,126,234,0.1)]">
        </div>
    </div>
    
    <button class="w-full py-2.5 border-none rounded text-sm font-semibold cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white shadow-[0_2px_8px_rgba(102,126,234,0.25)] hover:shadow-[0_4px_12px_rgba(102,126,234,0.35)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none" id="btnStep1Next">
        <span class="btn-text">Continue</span>
        <div class="spinner" style="display: none;"></div>
    </button>
</div>
