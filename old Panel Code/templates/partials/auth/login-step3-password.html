<!-- Step 2: Password -->
<div class="login-step" id="step2">
    <div class="text-[#f8fafc] text-[17px] font-semibold mb-1.5 text-center">Enter your password</div>
    <div class="text-[#a0aec0] text-[13px] text-center mb-4">Welcome back!</div>
    
    <div class="flex items-center gap-2.5 py-2.5 px-3.5 bg-[rgba(102,126,234,0.12)] border border-[rgba(102,126,234,0.3)] mb-3.5" id="userDisplay">
        <i class="fa-solid fa-user-circle text-[#667eea] text-xl"></i>
        <div class="flex-1">
            <div class="text-[#f8fafc] text-[15px] font-semibold" id="displayUserName">User Name</div>
            <div class="text-[#718096] text-[13px]" id="displayUserEmail">user@email.com</div>
        </div>
    </div>
    
    <div class="mb-3.5">
        <label class="block text-[#a0aec0] text-xs font-medium mb-1.5">Password</label>
        <div class="relative">
            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-[#718096] text-[15px]"></i>
            <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password" class="w-full py-2.5 px-2.5 pl-10 pr-11 bg-[rgba(102,126,234,0.05)] border border-[rgba(102,126,234,0.2)] text-[#f8fafc] text-sm transition-all duration-200 placeholder:text-[#718096] focus:outline-none focus:border-[#667eea] focus:bg-[rgba(102,126,234,0.1)] focus:ring-2 focus:ring-[rgba(102,126,234,0.1)]">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none text-[#718096] cursor-pointer p-1 text-[15px] leading-none z-[1] hover:text-[#a0aec0]" id="togglePassword" aria-label="Toggle password visibility">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>
    </div>
    
    <div class="text-right mb-4">
        <button type="button" class="bg-transparent border-none text-[#818cf8] text-[13px] cursor-pointer p-0 font-medium hover:text-[#667eea] hover:underline" id="btnForgotPassword">Forgot password?</button>
    </div>
    
    <button class="w-full py-2.5 border-none rounded text-sm font-semibold cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 bg-gradient-to-br from-[#667eea] to-[#764ba2] text-white shadow-[0_2px_8px_rgba(102,126,234,0.25)] hover:shadow-[0_4px_12px_rgba(102,126,234,0.35)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none" id="btnLogin">
        <span class="btn-text">Sign In</span>
        <div class="spinner" style="display: none;"></div>
    </button>
    <button class="w-full py-2.5 rounded text-sm font-semibold cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 bg-transparent text-[#a0aec0] border border-[rgba(102,126,234,0.2)] mt-2 hover:border-[#667eea] hover:text-[#f8fafc] hover:bg-[rgba(102,126,234,0.1)]" id="btnStep2Back">
        <i class="fa-solid fa-arrow-left"></i> Back
    </button>
</div>
