<!-- Delete Permanent Confirmation Modal (Pool List - requires 10-digit code) -->
<div class="upload-modal-overlay" id="deleteModalOverlay">
  <div class="upload-modal delete-modal">
    <div class="upload-modal-header delete-header">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Permanent Delete Warning</h3>
      <button type="button" class="upload-modal-close" id="closeDeleteModal" aria-label="Close delete modal"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="upload-modal-body">
      <div class="confirm-flow">
        <div class="modal-stepper" aria-hidden="true">
          <div class="modal-step is-active">
            <span class="modal-step-dot">1</span>
            <span class="modal-step-label">Review</span>
          </div>
          <div class="modal-stepper-line"></div>
          <div class="modal-step is-active">
            <span class="modal-step-dot">2</span>
            <span class="modal-step-label">Verify</span>
          </div>
        </div>

        <div class="confirm-flow-meta">
          <p><strong id="deleteCountText">0 card(s)</strong> will be permanently deleted.</p>
        </div>

        <div class="alert-box alert-box--danger">
          <p class="alert-box-heading">
            <i class="fa-solid fa-circle-exclamation"></i> Permanent Deletion Warning
          </p>
          <ul class="alert-box-list">
            <li>This action <strong>cannot be undone</strong></li>
            <li>Data will be <strong>permanently removed</strong> from database</li>
            <li><strong>No retrieve option</strong> is available after deletion</li>
          </ul>
        </div>

        <div class="confirm-flow-verify delete-verification-section">
          <p class="verify-hint">Type this code to confirm:</p>
          <span class="verify-code" id="deleteVerificationCode">----------</span>
          <div class="verification-input-wrapper confirm-code-input-wrap" id="deleteVerificationWrap" onclick="document.getElementById('deleteVerificationInput').focus()">
            <div class="confirm-code-boxes" id="deleteVerificationBoxes" aria-hidden="true">
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
              <span class="confirm-code-box"></span>
            </div>
            <input type="text"
                   id="deleteVerificationInput"
                   class="verification-input confirm-code-input-hidden"
                   maxlength="10"
                   inputmode="numeric"
                   pattern="[0-9]{10}"
                   autocomplete="off"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
          <span class="verification-status" id="verificationStatus"></span>
        </div>
      </div>
    </div>
    <div class="upload-modal-footer delete-footer">
      <button type="button" class="btn btn-md btn-neutral" id="cancelDeleteModal"><i class="fa-solid fa-xmark"></i> Cancel</button>
      <button type="button" class="btn btn-md btn-danger" id="confirmDeleteModal" disabled><i class="fa-solid fa-trash"></i> Delete Permanently</button>
    </div>
  </div>
</div>
