{% load static %}
{% if current_status == 'download' and not is_client and not is_client_staff %}
<!-- DateTime Range Filter (Download list  -  admin only) -->
<div class="filter-group datetime-filter-group" id="dateTimeFilterGroup">
    <label class="datetime-label">From</label>
    <input type="text" id="fromDateFilter" class="datetime-input" value="{{ from_date }}" title="Filter from date" placeholder="Select date & time" aria-label="From date" readonly>
    <label class="datetime-label">To</label>
    <input type="text" id="toDateFilter" class="datetime-input" value="{{ to_date }}" title="Filter to date" placeholder="Select date & time" aria-label="To date" readonly>
    <button class="btn btn-danger btn-sm" id="clearDateFilterBtn" type="button" title="Clear date filter">
        <i class="fa-solid fa-xmark"></i> Clear
    </button>
</div>
{% endif %}
<div class="filter-group">
    {% if is_super_admin or is_admin_staff %}
    <a href="{% url 'idcard_group' client_id=client.id %}" class="btn btn-settings" title="Back to ID Card Group">
        <i class="fa-solid fa-layer-group"></i> ID Card Group
    </a>
    <a href="{% url 'group_settings' client_id=client.id %}" class="btn btn-settings" title="Group Settings">
        <i class="fa-solid fa-gear"></i> Group Setting
    </a>
    {% elif is_client %}
    <a href="{% url 'client:idcard_group' %}" class="btn btn-settings" title="Back to ID Card Group">
        <i class="fa-solid fa-layer-group"></i> ID Card Group
    </a>
    {% if perm_idcard_setting_list %}
    <a href="{% url 'client:group_settings' %}" class="btn btn-settings" title="Group Settings">
        <i class="fa-solid fa-gear"></i> Group Setting
    </a>
    {% endif %}
    {% endif %}
</div>
