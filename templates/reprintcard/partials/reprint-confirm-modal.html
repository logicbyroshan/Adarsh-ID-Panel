<!-- Reprint Confirmation Modal -->
<div class="center-modal-overlay" id="reprintConfirmModal">
  <div class="center-modal reprint-confirm-modal">
    <div class="modal-header">
      <h3><i class="fa-solid fa-rotate"></i> Confirm Reprint Request</h3>
      <button class="modal-close" id="reprintConfirmClose" type="button" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-body-centered reprint-confirm-centered">
        <div class="modal-icon-circle reprint-confirm-icon">
          <i class="fa-solid fa-rotate"></i>
        </div>
        <p class="reprint-confirm-title">
          Reprint <strong id="reprintConfirmCount">0</strong> card(s)?
        </p>
        <p class="reprint-confirm-subtitle">
          Selected cards will be added to Request List for print processing.
        </p>

        <div class="reprint-confirm-edit-row">
          <span class="reprint-confirm-edit-note">Do you want to edit selected data first, or continue without edit?</span>
          <button class="btn btn-secondary" id="reprintWantEditBtn" type="button">
            <i class="fa-solid fa-pen-to-square"></i> Want to Edit
          </button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="reprintConfirmCancel" type="button">Cancel</button>
      <button class="btn reprint-confirm-submit" id="reprintConfirmSubmit" type="button">
        <i class="fa-solid fa-check"></i> Next Without Edit
      </button>
    </div>
  </div>
</div>
