{% load static %}

<!-- Confirmation Modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal-center modal-danger">
    <div class="modal-header">
      <h3 id="confirmTitle"><i class="fa-solid fa-triangle-exclamation"></i> Confirm Action</h3>
      <button class="modal-close" onclick="closeConfirmModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;align-items:center;text-align:center;">
      <div class="modal-icon-circle modal-icon-danger" id="confirmIconWrap">
        <i class="fa-solid fa-triangle-exclamation modal-icon-i-danger" id="confirmIconEl"></i>
      </div>
      <p id="confirmMessage" class="modal-body-subtitle"></p>
      <div class="alert-box alert-box--danger" id="confirmWarningBox">
        <p class="alert-box-heading">
          <i class="fa-solid fa-circle-exclamation"></i> Warning
        </p>
        <ul class="alert-box-list">
          <li>This action may affect the staff member's data</li>
          <li>Please confirm before proceeding</li>
        </ul>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-md btn-neutral" onclick="closeConfirmModal()"><i class="fa-solid fa-xmark"></i> Cancel</button>
      <button type="button" class="btn btn-md btn-danger" id="confirmBtn" onclick="executeConfirmAction()"><i class="fa-solid fa-check"></i> Confirm</button>
    </div>
  </div>
</div>
