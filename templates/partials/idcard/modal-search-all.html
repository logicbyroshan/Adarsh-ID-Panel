<!-- Search All Modal -->
<div class="upload-modal-overlay" id="searchAllModalOverlay">
  <div class="upload-modal search-all-modal">
    <div class="upload-modal-header">
      <h3><i class="fa-solid fa-magnifying-glass"></i> Search All Lists</h3>
      <button class="upload-modal-close" id="closeSearchAllModal" aria-label="Close search modal"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="upload-modal-body">
      <div class="search-all-form">
        <div class="search-input-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchAllInput" placeholder="Search by name, mobile, address..." autocomplete="off">
          <button class="clear-search-btn" id="clearSearchInput" style="display: none;" aria-label="Clear search">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="search-info">
          <span><i class="fa-solid fa-circle-info"></i> Searches across all lists: Pending, Verified, Pool, Approved, Download</span>
        </div>
      </div>
      <div class="search-results-container" id="searchResultsContainer">
        <div class="search-placeholder">
          <i class="fa-solid fa-magnifying-glass"></i>
          <p>Type to search across all lists</p>
        </div>
      </div>
    </div>
  </div>
</div>
