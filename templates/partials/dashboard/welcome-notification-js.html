<script>
(function() {
  // Welcome date/time
  function updateDateTime() {
    var now = new Date();
    var dateEl = document.getElementById('welcomeDate');
    var timeEl = document.getElementById('welcomeTime');
    if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: '2-digit' });
    if (timeEl) timeEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { updateDateTime(); setInterval(updateDateTime, 1000); });
  } else {
    updateDateTime(); setInterval(updateDateTime, 1000);
  }

  // Sliding notifications
  var _notifSlides = [];
  var _notifIndex = 0;
  var _slideTimer = null;
  var _pollTimer = null;
  var _dismissedIds = new Set();

  function clearSlideTimer() {
    if (_slideTimer) {
      clearInterval(_slideTimer);
      _slideTimer = null;
    }
  }

  function startSlideTimer() {
    clearSlideTimer();
    if (_notifSlides.length <= 1) return;
    _slideTimer = setInterval(function() {
      _notifIndex = (_notifIndex + 1) % _notifSlides.length;
      showNotifSlide(_notifIndex);
    }, 6000);
  }

  function showDefaultSlide() {
    clearSlideTimer();
    var banner = document.getElementById('clientWelcomeBanner');
    var defaultSlide = document.getElementById('welcomeDefaultSlide');
    var notifSlide = document.getElementById('welcomeNotifSlide');
    var dotsEl = document.getElementById('welcomeNotifDots');

    if (banner) banner.className = 'client-welcome-banner';
    if (defaultSlide) defaultSlide.style.display = '';
    if (notifSlide) notifSlide.style.display = 'none';
    if (dotsEl) {
      dotsEl.style.display = 'none';
      dotsEl.innerHTML = '';
    }
  }

  function rebuildDots() {
    var dotsEl = document.getElementById('welcomeNotifDots');
    if (!dotsEl) return;

    if (_notifSlides.length <= 1) {
      dotsEl.style.display = 'none';
      dotsEl.innerHTML = '';
      return;
    }

    dotsEl.innerHTML = _notifSlides.map(function(_, i) {
      return '<span class="notif-dot' + (i === _notifIndex ? ' active' : '') + '" data-idx="' + i + '"></span>';
    }).join('');
    dotsEl.style.display = '';
  }

  function loadSlidingNotifications() {
    var current = _notifSlides[_notifIndex];
    var currentId = current ? current.id : null;

    fetch('/api/notifications/list/?limit=5&unread_only=true', { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !data.success) return;

        var items = Array.isArray(data.notifications) ? data.notifications : [];
        _notifSlides = items.filter(function(item) {
          return item && !_dismissedIds.has(item.id);
        });

        if (!_notifSlides.length) {
          _notifIndex = 0;
          showDefaultSlide();
          return;
        }

        var nextIndex = 0;
        if (currentId != null) {
          var foundIndex = _notifSlides.findIndex(function(item) { return item.id === currentId; });
          if (foundIndex >= 0) nextIndex = foundIndex;
        }
        _notifIndex = nextIndex;
        rebuildDots();
        showNotifSlide(_notifIndex);
        startSlideTimer();
      })
      .catch(function() {});
  }

  function showNotifSlide(idx) {
    if (!_notifSlides.length) {
      showDefaultSlide();
      return;
    }

    if (idx >= _notifSlides.length) idx = 0;
    if (idx < 0) idx = 0;
    _notifIndex = idx;

    var notif = _notifSlides[_notifIndex];
    if (!notif) {
      showDefaultSlide();
      return;
    }

    var contentEl = document.getElementById('welcomeNotifContent');
    var banner = document.getElementById('clientWelcomeBanner');
    var defaultSlide = document.getElementById('welcomeDefaultSlide');
    var notifSlide = document.getElementById('welcomeNotifSlide');

    var categoryIcons = {
      general: 'fa-circle-info',
      announcement: 'fa-bullhorn',
      update: 'fa-arrow-up-right-dots',
      maintenance: 'fa-wrench',
      alert: 'fa-triangle-exclamation'
    };

    var cat = notif.category || 'general';
    var icon = categoryIcons[cat] || 'fa-bell';

    if (contentEl) {
      contentEl.innerHTML =
        '<div class="welcome-notif-icon ' + escAttrWN(cat) + '"><i class="fa-solid ' + escAttrWN(icon) + '"></i></div>' +
        '<div class="welcome-notif-body"><div class="welcome-notif-title">' + escHtmlWN(notif.title) + '</div>' +
        '<div class="welcome-notif-msg">' + escHtmlWN((notif.message || '').substring(0, 120)) + '</div></div>';
    }

    if (banner) banner.className = 'client-welcome-banner notif-cat-' + cat;
    if (defaultSlide) defaultSlide.style.display = 'none';
    if (notifSlide) {
      notifSlide.style.display = '';
      notifSlide.classList.remove('welcome-slide-enter');
      void notifSlide.offsetWidth;
      notifSlide.classList.add('welcome-slide-enter');
    }

    var dots = document.querySelectorAll('#welcomeNotifDots .notif-dot');
    dots.forEach(function(d, i) { d.classList.toggle('active', i === _notifIndex); });
  }

  function removeCurrentSlide(markAsDismissed) {
    if (!_notifSlides.length) return;

    var current = _notifSlides[_notifIndex];
    if (!current) return;
    if (markAsDismissed) {
      _dismissedIds.add(current.id);
    }

    _notifSlides.splice(_notifIndex, 1);
    if (_notifIndex >= _notifSlides.length) {
      _notifIndex = 0;
    }

    if (!_notifSlides.length) {
      showDefaultSlide();
      return;
    }

    rebuildDots();
    showNotifSlide(_notifIndex);
    startSlideTimer();
  }

  function markCurrentAsRead() {
    var current = _notifSlides[_notifIndex];
    if (!current) return;

    fetch('/api/notifications/' + current.id + '/read/', {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrfWN() },
      credentials: 'same-origin'
    }).then(function() {
      removeCurrentSlide(false);
    }).catch(function() {});
  }

  function dismissCurrent() {
    removeCurrentSlide(true);
  }

  function bindWelcomeActions() {
    var dismissBtn = document.getElementById('welcomeNotifDismiss');
    var markReadBtn = document.getElementById('welcomeNotifMarkRead');
    var dotsEl = document.getElementById('welcomeNotifDots');

    if (dismissBtn && !dismissBtn.dataset.bound) {
      dismissBtn.addEventListener('click', dismissCurrent);
      dismissBtn.dataset.bound = '1';
    }

    if (markReadBtn && !markReadBtn.dataset.bound) {
      markReadBtn.addEventListener('click', markCurrentAsRead);
      markReadBtn.dataset.bound = '1';
    }

    if (dotsEl && !dotsEl.dataset.bound) {
      dotsEl.addEventListener('click', function(event) {
        var target = event.target;
        if (!target || !target.classList.contains('notif-dot')) return;
        var idx = parseInt(target.getAttribute('data-idx'), 10);
        if (isNaN(idx)) return;
        showNotifSlide(idx);
        startSlideTimer();
      });
      dotsEl.dataset.bound = '1';
    }
  }

  function getCsrfWN() {
    var c = document.cookie.split(';').find(function(c) { return c.trim().startsWith('csrftoken='); });
    if (c) return c.split('=')[1];
    var m = document.querySelector('meta[name="csrf-token"]');
    return m ? m.getAttribute('content') : '';
  }
  function escHtmlWN(s) { if (!s) return '-'; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttrWN(s) { if (!s) return ''; return s.replace(/[&"'<>]/g, function(c) { return {'&':'&amp;','"':'&quot;',"'":'&#39;','<':'&lt;','>':'&gt;'}[c]; }); }

  bindWelcomeActions();

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadSlidingNotifications);
  } else {
    loadSlidingNotifications();
  }

  _pollTimer = setInterval(loadSlidingNotifications, 45000);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      loadSlidingNotifications();
    }
  });

  window.addEventListener('beforeunload', function() {
    clearSlideTimer();
    if (_pollTimer) {
      clearInterval(_pollTimer);
      _pollTimer = null;
    }
  });
})();
</script>
