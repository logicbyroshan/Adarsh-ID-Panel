<!-- Bulk Actions -->
<div class="dashboard-card">
  <div class="dashboard-card-header">
    <h3><i class="fa-solid fa-gears"></i> Bulk Actions</h3>
  </div>
  <div class="dashboard-card-body">
    <div class="bulk-actions-panel">
      <div class="bulk-actions-selectors">
        <div class="bulk-select-group">
          <select id="bulkClientSelect" class="form-select">
            <option value="">Select Client</option>
          </select>
        </div>
        <div class="bulk-select-group">
          <select id="bulkTableSelect" class="form-select" disabled>
            <option value="">Select Table</option>
          </select>
        </div>
      </div>
      <div class="bulk-actions-buttons" id="bulkActionsButtons">
        {% if is_super_admin or perm_idcard_bulk_download %}
        <button class="bulk-action-btn" data-action="download-all" disabled>
          <i class="fa-solid fa-id-card"></i>
          <span>Download All Cards</span>
        </button>
        {% endif %}
        {% if is_super_admin or perm_delete_all_idcard %}
        <button class="bulk-action-btn" data-action="delete-all" disabled>
          <i class="fa-solid fa-trash"></i>
          <span>Delete All Cards</span>
        </button>
        {% endif %}
        {% if is_super_admin or perm_idcard_bulk_reupload %}
        <button class="bulk-action-btn" data-action="reupload" disabled>
          <i class="fa-solid fa-images"></i>
          <span>Reupload Images</span>
        </button>
        {% endif %}
        {% if is_super_admin or perm_idcard_upgrade_all %}
        <button class="bulk-action-btn" data-action="upgrade" disabled>
          <i class="fa-solid fa-arrow-up"></i>
          <span>Upgrade All Class</span>
        </button>
        {% endif %}
      </div>
    </div>
  </div>
</div>
