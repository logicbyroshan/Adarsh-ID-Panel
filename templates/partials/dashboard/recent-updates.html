{% load static %}
<!-- Recent Client Updates - Super Admin view -->
<div class="dashboard-card">
  <div class="dashboard-card-header updates-header">
    <h3><i class="fa-solid fa-users"></i> Recent Client Updates</h3>
    <div class="recent-updates-badge-group">
      <span class="recent-updates-active-badge" id="recentClientUpdatesActiveBadge" title="Clients currently online right now">
        Live Working Clients: 0
      </span>
      <span class="recent-updates-active-badge recent-updates-assistant-badge" id="recentClientUpdatesAssistantBadge" title="Client assistants currently online right now">
        Live Working Assistants: 0
      </span>
    </div>
    <div class="recent-updates-search-inline">
      <div class="recent-updates-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="recentClientUpdatesSearch"
          class="recent-updates-search-input"
          placeholder="Search client or table name"
          autocomplete="off"
        >
      </div>
    </div>
  </div>
  <div class="dashboard-card-body tall-body p-0 table-scroll-body">
    <div class="recent-table-wrapper dashboard-scroll-table-wrapper">
    <table class="recent-table dashboard-scroll-table recent-table-6col">
      <thead>
        <tr>
          <th scope="col">Client</th>
          <th scope="col" class="text-center recent-updates-sortable" data-recent-sort-key="pending" aria-sort="none" tabindex="0" title="Sort by highest pending count. Click again to clear sorting.">Pending <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
          <th scope="col" class="text-center recent-updates-sortable" data-recent-sort-key="verified" aria-sort="none" tabindex="0" title="Sort by highest verified count. Click again to clear sorting.">Verified <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
          <th scope="col" class="text-center recent-updates-sortable" data-recent-sort-key="approved" aria-sort="none" tabindex="0" title="Sort by highest approved count. Click again to clear sorting.">Approved <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
          <th scope="col" class="text-center recent-updates-sortable" data-recent-sort-key="downloaded" aria-sort="none" tabindex="0" title="Sort by highest downloaded count. Click again to clear sorting.">Downloaded <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
          <th scope="col" class="text-center recent-updates-sortable" data-recent-sort-key="pool" aria-sort="none" tabindex="0" title="Sort by highest pool count. Click again to clear sorting.">Pool <i class="fa-solid fa-sort recent-sort-icon" aria-hidden="true"></i></th>
        </tr>
      </thead>
      <tbody id="recentClientUpdatesBody">
        <!-- Will be populated dynamically -->
        <tr class="dashboard-table-skeleton-row">
          <td><span class="dash-skeleton dash-skeleton-line" style="width: 78%;"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
        </tr>
        <tr class="dashboard-table-skeleton-row">
          <td><span class="dash-skeleton dash-skeleton-line" style="width: 66%;"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
        </tr>
        <tr class="dashboard-table-skeleton-row">
          <td><span class="dash-skeleton dash-skeleton-line" style="width: 72%;"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
          <td><span class="dash-skeleton dash-skeleton-pill"></span></td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
