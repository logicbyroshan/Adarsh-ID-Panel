    <!-- View Staff Drawer -->
    <div id="staff-drawer" class="drawer-modal">
      <div class="drawer-content drawer-wide">
        <div class="drawer-header">
          <h3>
            <i class="fa-solid fa-users"></i>
            <span style="display:inline-flex;align-items:center;gap:8px;">
              <span id="staffDrawerClientLogo" style="width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,0.45);background:rgba(255,255,255,0.2);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
                <i class="fa-solid fa-building" style="font-size: var(--ui-font-size-sm, 12px);"></i>
              </span>
              <span><span id="staffDrawerClientName">Client</span>'s Staff</span>
            </span>
          </h3>
          <button class="drawer-close" id="closeStaffDrawer" aria-label="Close staff drawer"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-body">
          <!-- Staff Summary -->
          <div class="staff-summary">
            <div class="summary-card">
              <div class="summary-icon">
                <i class="fa-solid fa-users"></i>
              </div>
              <div class="summary-info">
                <span class="summary-count" id="totalStaffCount">0</span>
                <span class="summary-label">Total Staff</span>
              </div>
            </div>
            <div class="summary-card">
              <div class="summary-icon active">
                <i class="fa-solid fa-user-check"></i>
              </div>
              <div class="summary-info">
                <span class="summary-count" id="activeStaffCount">0</span>
                <span class="summary-label">Active</span>
              </div>
            </div>
            <div class="summary-card">
              <div class="summary-icon inactive">
                <i class="fa-solid fa-user-xmark"></i>
              </div>
              <div class="summary-info">
                <span class="summary-count" id="inactiveStaffCount">0</span>
                <span class="summary-label">Inactive</span>
              </div>
            </div>
          </div>
          
          <!-- Staff Section -->
          <div class="staff-section">
            <div class="staff-list" id="staffList">
              <!-- Staff cards will be inserted here -->
            </div>
            <div class="no-staff" id="noStaffMessage" style="display: none;">
              <i class="fa-solid fa-users-slash"></i>
              <p>No Staff Members</p>
              <span class="no-staff-hint">This client hasn't added any staff yet.</span>
            </div>
          </div>
        </div>
        <div class="drawer-footer">
          <button type="button" class="btn btn-md btn-neutral" id="closeStaffDrawerBtn"><i class="fa-solid fa-xmark"></i> Close</button>
        </div>
      </div>
    </div>
