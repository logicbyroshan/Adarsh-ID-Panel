{% if is_pro_user and not is_impersonating %}
<!-- Impersonate Modal  -  Pro User picks a user to login as -->
<div id="impersonateModal"
     class="fixed inset-0 z-[9998] items-center justify-center bg-black/50 backdrop-blur-sm"
     style="display:none;"
     onclick="if(event.target===this) this.style.display='none';">
  <div class="bg-[#1e293b] rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[80vh] flex flex-col overflow-hidden border border-[rgba(102,126,234,0.2)]"
       onclick="event.stopPropagation();">

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-[rgba(255,255,255,0.08)]">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-[#667eea] to-[#764ba2] flex items-center justify-center">
          <i class="fa-solid fa-user-secret text-white text-sm"></i>
        </div>
        <div>
          <h3 class="text-[#f8fafc] text-sm font-semibold">Login As User</h3>
          <p class="text-[#718096] text-xs">Select a user to impersonate</p>
        </div>
      </div>
      <button onclick="document.getElementById('impersonateModal').style.display='none'"
              class="w-8 h-8 flex items-center justify-center rounded-lg text-[#a0aec0] hover:text-white hover:bg-white/10 transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Search -->
    <div class="px-5 py-3 border-b border-[rgba(255,255,255,0.05)]">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[#718096] text-xs"></i>
        <input id="impersonateSearch" type="text" placeholder="Search by name, email, or role..."
               class="w-full pl-9 pr-3 py-2 bg-[#0f172a] border border-[rgba(102,126,234,0.2)] rounded-lg text-[#f8fafc] text-sm placeholder-[#4a5568] focus:border-[#667eea] focus:outline-none transition-colors"
               oninput="window.__filterImpersonateUsers(this.value)">
      </div>
      <!-- Role filter pills -->
      <div class="flex flex-wrap gap-1.5 mt-2.5" id="impersonateRoleFilters">
        <button class="imp-role-pill active text-xs px-2.5 py-1 rounded-md border transition-colors" data-role="all"
                onclick="window.__setImpersonateRoleFilter('all', this)">All</button>
        <button class="imp-role-pill text-xs px-2.5 py-1 rounded-md border transition-colors" data-role="super_admin"
                onclick="window.__setImpersonateRoleFilter('super_admin', this)">Super Admin</button>
        <button class="imp-role-pill text-xs px-2.5 py-1 rounded-md border transition-colors" data-role="admin_staff"
                onclick="window.__setImpersonateRoleFilter('admin_staff', this)">Operator</button>
        <button class="imp-role-pill text-xs px-2.5 py-1 rounded-md border transition-colors" data-role="client"
                onclick="window.__setImpersonateRoleFilter('client', this)">Client</button>
        <button class="imp-role-pill text-xs px-2.5 py-1 rounded-md border transition-colors" data-role="client_staff"
                onclick="window.__setImpersonateRoleFilter('client_staff', this)">Assistent</button>
      </div>
    </div>

    <!-- User list -->
    <div class="flex-1 overflow-y-auto px-5 py-3" id="impersonateUserList">
      {% for _ in "12345" %}
      <div class="imp-user-skeleton-row" aria-hidden="true">
        <div class="imp-user-skeleton imp-user-skeleton-avatar"></div>
        <div class="imp-user-skeleton-main">
          <div class="imp-user-skeleton imp-user-skeleton-title"></div>
          <div class="imp-user-skeleton imp-user-skeleton-subtitle"></div>
        </div>
        <div class="imp-user-skeleton imp-user-skeleton-badge"></div>
      </div>
      {% endfor %}
    </div>

    <!-- Footer -->
    <div class="px-5 py-3 border-t border-[rgba(255,255,255,0.08)] text-center">
      <span class="text-[#718096] text-xs"><i class="fa-solid fa-shield-halved"></i> Pro User impersonation  -  for testing only</span>
    </div>
  </div>
</div>

<style>
  @keyframes imp-user-skeleton-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .imp-role-pill {
    color: #a0aec0;
    border-color: rgba(var(--primary-rgb), 0.2);
    background: transparent;
    cursor: pointer;
  }
  .imp-role-pill:hover, .imp-role-pill.active {
    color: #f8fafc;
    border-color: var(--color-primary);
    background: rgba(var(--primary-rgb), 0.15);
  }
  .imp-user-card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 0.75rem;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .imp-user-card:hover {
    background: rgba(var(--primary-rgb), 0.08);
    border-color: rgba(var(--primary-rgb), 0.2);
  }
  .imp-user-card .imp-role-badge {
    font-size: 0.65rem;
    padding: 0.125rem 0.4rem;
    border-radius: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .imp-role-badge.role-super_admin { background: rgba(var(--primary-rgb), 0.2); color: var(--color-indigo-300); }
  .imp-role-badge.role-admin_staff { background: rgba(var(--yellow-rgb), 0.2); color: #fbbf24; }
  .imp-role-badge.role-client { background: rgba(72,187,120,0.2); color: #68d391; }
  .imp-role-badge.role-client_staff { background: rgba(99,179,237,0.2); color: #63b3ed; }
  .imp-user-skeleton-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 0.75rem;
    border-radius: 0.5rem;
    margin-bottom: 0.4rem;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .imp-user-skeleton-row:last-child {
    margin-bottom: 0;
  }
  .imp-user-skeleton {
    border-radius: 8px;
    background: linear-gradient(90deg, rgba(148,163,184,0.25) 25%, rgba(148,163,184,0.38) 37%, rgba(148,163,184,0.25) 63%);
    background-size: 200% 100%;
    animation: imp-user-skeleton-shimmer 1.35s linear infinite;
  }
  .imp-user-skeleton-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .imp-user-skeleton-main {
    flex: 1;
    min-width: 0;
  }
  .imp-user-skeleton-title {
    width: 52%;
    height: 11px;
    margin-bottom: 7px;
  }
  .imp-user-skeleton-subtitle {
    width: 72%;
    height: 10px;
  }
  .imp-user-skeleton-badge {
    width: 74px;
    height: 20px;
    border-radius: 6px;
    flex-shrink: 0;
  }
</style>

<script>
(function() {
  var _users = [];
  var _roleFilter = 'all';
  var _textFilter = '';

  // Fetch users when modal opens
  var modal = document.getElementById('impersonateModal');
  var origDisplay = modal.style.display;
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.attributeName === 'style' && modal.style.display === 'flex' && !_users.length) {
        _loadUsers();
      }
    });
  });
  observer.observe(modal, { attributes: true });

  function _loadUsers() {
    var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content
                 || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    fetch('/panel/api/auth/impersonate/users/', {
      headers: { 'X-CSRFToken': csrfToken }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        _users = data.users;
        _renderUsers();
      } else {
        document.getElementById('impersonateUserList').innerHTML =
          '<div class="text-center text-red-400 text-sm py-8">' + _escHtml(data.message || 'Failed to load users') + '</div>';
      }
    })
    .catch(function() {
      document.getElementById('impersonateUserList').innerHTML =
        '<div class="text-center text-red-400 text-sm py-8">Network error. Please try again.</div>';
    });
  }

  function _renderUsers() {
    var filtered = _users.filter(function(u) {
      if (_roleFilter !== 'all' && u.role !== _roleFilter) return false;
      if (_textFilter) {
        var q = _textFilter.toLowerCase();
        return (u.name.toLowerCase().indexOf(q) !== -1 ||
                u.email.toLowerCase().indexOf(q) !== -1 ||
                u.role_display.toLowerCase().indexOf(q) !== -1);
      }
      return true;
    });

    var list = document.getElementById('impersonateUserList');
    if (!filtered.length) {
      list.innerHTML = '<div class="text-center text-[#718096] text-sm py-8">No users found</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(u) {
      var initial = (u.name[0] || '?').toUpperCase();
      html += '<div class="imp-user-card" onclick="window.__startImpersonation(' + u.id + ')" title="Login as ' + _escHtml(u.name) + '">'
        + '<div class="w-9 h-9 rounded-lg flex items-center justify-center text-white text-xs font-bold shrink-0" style="background:' + _roleColor(u.role) + '">' + initial + '</div>'
        + '<div class="flex-1 min-w-0">'
        + '<div class="text-[#f8fafc] text-sm font-medium truncate">' + _escHtml(u.name) + '</div>'
        + '<div class="text-[#718096] text-xs truncate">' + _escHtml(u.email) + '</div>'
        + '</div>'
        + '<span class="imp-role-badge role-' + u.role + '">' + _escHtml(u.role_display) + '</span>'
        + '</div>';
    });
    list.innerHTML = html;
  }

  function _roleColor(role) {
    var colors = { super_admin: '#667eea', admin_staff: '#d97706', client: '#38a169', client_staff: '#3182ce' };
    return colors[role] || '#667eea';
  }

  function _escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  window.__filterImpersonateUsers = function(val) {
    _textFilter = val;
    _renderUsers();
  };

  window.__setImpersonateRoleFilter = function(role, btn) {
    _roleFilter = role;
    document.querySelectorAll('.imp-role-pill').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    _renderUsers();
  };

  window.__startImpersonation = function(userId) {
    var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content
                 || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    fetch('/panel/api/auth/impersonate/start/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
      body: JSON.stringify({ user_id: userId })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        window.location.href = data.redirect_url || '/panel/';
      } else {
        alert(data.message || 'Failed to start impersonation.');
      }
    })
    .catch(function() { alert('Network error. Please try again.'); });
  };
})();
</script>
{% endif %}
