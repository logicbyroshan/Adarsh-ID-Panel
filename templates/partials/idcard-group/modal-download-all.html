<!-- Download All Confirmation + Progress Modal -->
<div id="downloadAllModal" class="center-modal-overlay center-modal-theme-blue"
  x-show="isDownloadAllModalOpen" x-transition.opacity
     style="display:none">
  <div class="center-modal-card" @click.stop
    x-show="isDownloadAllModalOpen" x-transition.scale.origin.center>
    <!-- Header -->
    <div class="center-modal-header">
      <h3><i class="fa-solid fa-download"></i> Download All ID Cards</h3>
      <button type="button" class="center-modal-header-close" @click="closeModal" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Body -->
    <div class="center-modal-body-area">
    <!-- Confirmation step -->
    <div id="downloadAllConfirmStep">
      <p class="center-modal-subtitle" id="downloadAllTableLabel">
        Download all cards from this table?
      </p>

      <!-- Format selector -->
      <div style="margin:10px 0;">
        <label class="center-modal-label">Select Format</label>
        <select class="center-modal-select" id="downloadAllFormat">
          {% if not is_client and not is_client_staff %}
          <option value="all">All Formats (ZIP)</option>
          <option value="xlsx">Excel (.xlsx)</option>
          {% endif %}
          <option value="pdf">PDF</option>
          {% if not is_client and not is_client_staff %}
          <option value="docx">Word (.docx)</option>
          {% endif %}
        </select>
      </div>
    </div>
    <!-- Progress step -->
    <div id="downloadAllProgressStep" style="display:none;">
      <h4 class="center-modal-subtitle" style="font-weight:600;color:var(--color-slate-800);">Downloading ID Cards</h4>
      <p class="center-modal-subtitle" id="downloadAllProgressLabel">Preparing your files...</p>
      <div id="downloadAllProgress" class="center-modal-progress" style="display:block">
        <div class="center-modal-progress-track">
          <div id="downloadAllBar" class="center-modal-progress-bar" style="width:0%"></div>
        </div>
        <p class="center-modal-progress-text" id="downloadAllStatus">Connecting to server...</p>
      </div>
      <div class="center-modal-actions" id="downloadAllActions" style="display:none">
        <button class="center-modal-btn center-modal-btn-cancel" @click="closeModal">Close</button>
      </div>
    </div>
    </div><!-- end body-area -->
    <!-- Footer -->
    <div class="center-modal-footer-area" id="downloadAllFooter">
      <button class="center-modal-btn center-modal-btn-cancel" @click="closeModal">Cancel</button>
      <button class="center-modal-btn center-modal-btn-confirm" id="downloadAllStartBtn">
        <i class="fa-solid fa-download mr-1"></i> Download
      </button>
    </div>
  </div>
</div>
