<!-- Step Indicator -->
<div class="flex justify-center gap-1.5 mb-4" role="group" aria-label="Login progress">
    <div class="step-dot active" data-step="1" aria-label="Step 1: Email" aria-current="step"></div>
    <div class="step-dot" data-step="2" aria-label="Step 2: Password"></div>
    <div class="step-dot" data-step="3" aria-label="Step 3: OTP verification"></div>
    <div class="step-dot" data-step="4" aria-label="Step 4: Reset password"></div>
</div>

<!-- Message Display -->
<div class="message" id="messageBox" role="alert" aria-live="assertive"></div>
