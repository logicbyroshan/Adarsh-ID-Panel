<!-- === EMAIL MANAGEMENT TAB === -->
<div class="panel-tab-content panel-tab-full-height email-panel-theme" id="tab-email-logs">

  <!-- Actions / Filter bar -->
  <div class="notif-actions-bar">
    <div class="notif-actions-left">
      <div class="notif-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="emailSearch" placeholder="Search recipient, email, subject..." oninput="debounceEmailSearch()" aria-label="Search email logs">
      </div>
      <select id="emailStatusFilter" class="form-select form-select-sm" onchange="loadEmailLogs(1)">
        <option value="">All Statuses</option>
        <option value="on_hold">On Hold</option>
        <option value="pending">Pending</option>
        <option value="sent">Sent</option>
        <option value="failed">Failed</option>
      </select>
      <select id="emailTypeFilter" class="form-select form-select-sm" onchange="loadEmailLogs(1)">
        <option value="">All Types</option>
        <option value="welcome">Welcome / Activation</option>
        <option value="temp_password">Temp Password</option>
        <option value="password_change">Password Change Notice</option>
        <option value="otp_reset">Password Reset OTP</option>
        <option value="system">System / Custom</option>
      </select>
      <select id="emailSortFilter" class="form-select form-select-sm" onchange="loadEmailLogs(1)" aria-label="Sort email logs by date">
        <option value="latest" selected>Latest</option>
        <option value="oldest">Oldest</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick="openNewEmailModal()">
        <i class="fa-solid fa-plus"></i> Add New Email
      </button>
      <button class="btn btn-sm btn-outline-primary" onclick="loadEmailLogs(1)">
        <i class="fa-solid fa-rotate-right"></i> Refresh
      </button>
    </div>
    <div class="notif-actions-right">
      <span
        class="email-status-badge on-hold email-status-filter"
        data-email-status="on_hold"
        role="button"
        tabindex="0"
        aria-pressed="false"
        title="Filter: On Hold"
        onclick="setEmailStatusQuickFilter('on_hold')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setEmailStatusQuickFilter('on_hold');}"
      >
        <i class="fa-solid fa-clock"></i> <span id="emailCountOnHold">0</span>
      </span>
      <span
        class="email-status-badge pending email-status-filter"
        data-email-status="pending"
        role="button"
        tabindex="0"
        aria-pressed="false"
        title="Filter: Pending"
        onclick="setEmailStatusQuickFilter('pending')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setEmailStatusQuickFilter('pending');}"
      >
        <i class="fa-solid fa-hourglass-half"></i> <span id="emailCountPending">0</span>
      </span>
      <span
        class="email-status-badge sent email-status-filter"
        data-email-status="sent"
        role="button"
        tabindex="0"
        aria-pressed="false"
        title="Filter: Sent"
        onclick="setEmailStatusQuickFilter('sent')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setEmailStatusQuickFilter('sent');}"
      >
        <i class="fa-solid fa-circle-check"></i> <span id="emailCountSent">0</span>
      </span>
      <span
        class="email-status-badge failed email-status-filter"
        data-email-status="failed"
        role="button"
        tabindex="0"
        aria-pressed="false"
        title="Filter: Failed"
        onclick="setEmailStatusQuickFilter('failed')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setEmailStatusQuickFilter('failed');}"
      >
        <i class="fa-solid fa-circle-xmark"></i> <span id="emailCountFailed">0</span>
      </span>
    </div>
  </div>

  <!-- Email Logs Table -->
  <div class="notif-table-wrap">
    <table class="notif-table" id="emailLogsTable">
      <colgroup>
        <col style="width: 5%;">
        <col style="width: 18%;">
        <col style="width: 22%;">
        <col style="width: 15%;">
        <col style="width: 11%;">
        <col style="width: 13%;">
        <col style="width: 16%;">
      </colgroup>
      <thead>
        <tr>
          <th scope="col">Sr no.</th>
          <th scope="col">Recipient</th>
          <th scope="col">Email Address</th>
          <th scope="col">Type</th>
          <th scope="col">Status</th>
          <th scope="col">Created</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody id="emailLogsBody">
        <tr class="notif-table-empty">
          <td colspan="7">
            <div class="empty-state">
              <i class="fa-solid fa-envelope"></i>
              <p>No email logs yet</p>
              <span>Logs will appear here after emails are sent</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination-bar notif-pagination-bar">
    <div class="pagination-left">
      <span class="pagination-info" id="emailLogCountLabel"></span>
    </div>
    <div class="pagination-center">
      <button class="pagination-btn" id="emailFirstBtn" onclick="emailSetPage(1)" disabled title="First Page" aria-label="First page">
        <i class="fa-solid fa-angles-left"></i>
      </button>
      <button class="pagination-btn" id="emailPrevBtn" onclick="emailLogPage(-1)" disabled>
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <span class="page-numbers" id="emailPageNumbers">
        <button class="page-num active">1</button>
      </span>
      <button class="pagination-btn" id="emailNextBtn" onclick="emailLogPage(1)" disabled>
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <button class="pagination-btn" id="emailLastBtn" onclick="emailSetPage(-1)" disabled title="Last Page" aria-label="Last page">
        <i class="fa-solid fa-angles-right"></i>
      </button>
    </div>
    <div class="pagination-right">
      <label for="emailRowsPerPage">Rows per page:</label>
      <select id="emailRowsPerPage" class="form-select form-select-sm" onchange="onEmailRowsPerPageChange(this.value)">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

</div>

<!-- Compose / Edit Email Modal -->
<div class="center-modal-overlay center-modal-theme-blue email-compose-modal" id="emailComposeModal" style="display:none;">
  <div class="center-modal-card" @click.stop>
    <div class="center-modal-header">
      <h3 id="emailComposeTitle"><i class="fa-solid fa-envelope-open-text"></i> Compose Email</h3>
      <button type="button" class="center-modal-header-close" onclick="closeEmailComposeModal()" title="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="center-modal-body-area">
      <form id="emailComposeForm" onsubmit="return submitEmailCompose(event)">
        <input type="hidden" id="emailComposeLogId" value="">
        <input type="hidden" id="emailComposeBodyHtml" value="">

        <div class="email-compose-layout">
          <div class="email-compose-left">
            <div class="panel-form-row">
              <div>
                <label class="panel-form-label">Recipient Name</label>
                <input type="text" class="panel-form-input" id="emailComposeRecipientName" maxlength="200" placeholder="Recipient name">
              </div>
              <div>
                <label class="panel-form-label">Recipient Email *</label>
                <input type="email" class="panel-form-input" id="emailComposeRecipientEmail" required maxlength="254" placeholder="user@example.com">
              </div>
            </div>

            <div class="panel-form-row">
              <div>
                <label class="panel-form-label">Email Type</label>
                <select class="form-select panel-form-select form-select-sm" id="emailComposeType">
                  <option value="system">System / Custom</option>
                  <option value="welcome">Welcome / Activation</option>
                  <option value="temp_password">Temp Password</option>
                  <option value="password_change">Password Change Notice</option>
                  <option value="otp_reset">Password Reset OTP</option>
                </select>
              </div>
              <div>
                <label class="panel-form-label">Subject *</label>
                <input type="text" class="panel-form-input" id="emailComposeSubject" required maxlength="300" placeholder="Email subject">
              </div>
            </div>

            <label class="panel-form-label">Message Body *</label>
            <textarea class="panel-form-input" id="emailComposeBodyText" rows="14" required placeholder="Write your email here..."></textarea>
          </div>

          <div class="email-compose-right">
            <div class="email-template-preview-wrap">
              <div class="email-template-preview-head">
                <span class="email-template-preview-title">Live Email Preview</span>
                <span class="email-template-preview-subtitle">This is exactly how the receiver will see the email design</span>
              </div>
              <div class="email-template-preview-frame">
                <div id="emailComposePreview" class="email-template-preview-content"></div>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div class="center-modal-footer-area">
      <button type="button" class="center-modal-btn center-modal-btn-cancel" onclick="closeEmailComposeModal()">Cancel</button>
      <button type="submit" form="emailComposeForm" class="center-modal-btn center-modal-btn-confirm" id="emailComposeSendBtn">
        <i class="fa-solid fa-paper-plane"></i> Send Email
      </button>
    </div>
  </div>
</div>
