{% load static %}
<!-- Top Navbar -->
<header class="topbar">
  <div class="nav-left">
    <button class="sidebar-toggle" id="sidebarToggle" @click="toggleSidebar" aria-label="Toggle sidebar">
      <i class="fa-solid fa-bars" :class="sidebarToggleIconClass"></i>
    </button>
    <div class="breadcrumb">
      <a href="{% url 'dashboard' %}" class="breadcrumb-item"><i class="fa-solid fa-house"></i> Home</a>
      <i class="fa-solid fa-chevron-right breadcrumb-sep"></i>
      <span class="breadcrumb-item active">{{ breadcrumb_label|default:"Manage Panel" }}</span>
    </div>
  </div>
  <div class="nav-right">
    <button class="global-search-btn" id="globalSearchBtn">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Search ID cards...</span>
      <kbd>Ctrl+K</kbd>
    </button>
  </div>
</header>
