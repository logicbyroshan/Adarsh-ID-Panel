<!-- === MAINTENANCE SECTION (embedded in Notifications) === -->
<div class="panel-inline-maintenance maintenance-panel-theme" id="notificationMaintenanceSection">

  <!-- Header bar -->
  <div class="notif-actions-bar">
    <div class="notif-actions-left">
      <span class="panel-title">
        <i class="fa-solid fa-gear"></i>
        System Maintenance
      </span>
      <span id="mtStatusBadge" class="maintenance-status-text">
        Status: Inactive
      </span>
    </div>
    <div class="notif-actions-right">
      <span id="mtStatusLabel" style="color: var(--color-slate-500); font-size: var(--ui-font-size-sm, 12px);">System is running normally</span>
      <button class="btn btn-sm btn-outline-primary" onclick="loadMaintenanceStatus()">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
  </div>

  <!-- Status + Controls Grid -->
  <div class="system-grid" id="mtGrid">

    <!-- Left: Message -->
    <div class="system-card">
      <div class="system-card-header">
        <i class="fa-solid fa-message"></i> Maintenance Message
      </div>
      <div class="system-card-body" style="padding: 14px 16px;">
        <div class="system-row" style="flex-direction: column; align-items: stretch; gap: 4px;">
          <span class="system-label">Maintenance Message</span>
          <textarea id="mtMessage" rows="7" class="form-input" style="width: 100%; resize: vertical; font-size: var(--ui-font-size-sm, 12px); min-height: 170px;"
                    placeholder="The system is under scheduled maintenance. Please check back shortly."></textarea>
          <span class="system-value" style="font-size: var(--ui-font-size-xs, 11px); color: var(--color-slate-400); font-weight: 500;">
            This message appears on the maintenance page and in automatic user notifications.
          </span>
        </div>
      </div>
    </div>

    <!-- Right: Controls -->
    <div class="system-card">
      <div class="system-card-header">
        <i class="fa-solid fa-sliders"></i> Maintenance Controls
      </div>
      <div class="system-card-body" style="padding: 14px 16px;">
        <!-- Duration -->
        <div class="system-row" style="flex-direction: column; align-items: stretch; gap: 6px;">
          <span class="system-label">Duration</span>
          <div style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
            <button type="button" class="btn btn-sm btn-primary mt-dur-btn" data-min="60" onclick="setMtDuration(60)">1 hr</button>
            <button type="button" class="btn btn-sm btn-neutral mt-dur-btn" data-min="360" onclick="setMtDuration(360)">6 hr</button>
            <button type="button" class="btn btn-sm btn-neutral mt-dur-btn" data-min="1440" onclick="setMtDuration(1440)">1 day</button>
            <input type="hidden" id="mtDuration" value="60">
          </div>
        </div>

        <!-- Actions -->
        <div style="display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--color-slate-100);">
          <button type="button" id="mtEnableBtn" class="btn btn-md btn-danger" onclick="toggleMaintenance('enable')">
            <i class="fa-solid fa-power-off"></i> Enable Maintenance Mode
          </button>
          <button type="button" id="mtDisableBtn" class="btn btn-md btn-success" onclick="toggleMaintenance('disable')" style="display: none;">
            <i class="fa-solid fa-circle-check"></i> Disable Maintenance Mode
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  var API_URL = "{% url 'api_maintenance_toggle' %}";
  var STATUS_URL = "{% url 'api_system_maintenance_check' %}";
  var csrf = document.querySelector('meta[name="csrf-token"]')?.content || '';

  function setMtDuration(min) {
    document.getElementById('mtDuration').value = min;
    document.querySelectorAll('.mt-dur-btn').forEach(function(b) {
      b.classList.toggle('btn-primary', parseInt(b.dataset.min) === min);
      b.classList.toggle('btn-neutral', parseInt(b.dataset.min) !== min);
    });
  }
  window.setMtDuration = setMtDuration;

  function updateUI(status) {
    var badge = document.getElementById('mtStatusBadge');
    var label = document.getElementById('mtStatusLabel');
    var enableBtn = document.getElementById('mtEnableBtn');
    var disableBtn = document.getElementById('mtDisableBtn');

    if (status.enabled) {
      badge.textContent = 'Status: Active';
      badge.classList.add('is-active');
      var msg = 'Maintenance mode is active';
      if (status.end_time) {
        var end = new Date(status.end_time);
        msg += '  ends ' + end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      }
      label.textContent = msg;
      enableBtn.style.display = 'none';
      disableBtn.style.display = '';
    } else {
      badge.textContent = 'Status: Inactive';
      badge.classList.remove('is-active');
      label.textContent = 'System is running normally';
      enableBtn.style.display = '';
      disableBtn.style.display = 'none';
    }
  }

  function toggleMaintenance(action) {
    var body = { action: action };
    if (action === 'enable') {
      var durationInput = document.getElementById('mtDuration').value;
      body.message = document.getElementById('mtMessage').value;
      if (durationInput) {
        body.duration_minutes = parseInt(durationInput);
      }
    }

    fetch(API_URL, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
      body: JSON.stringify(body)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        updateUI(data.status);
        if (typeof showToast === 'function') showToast(data.message, 'success');
      } else {
        if (typeof showToast === 'function') showToast(data.message || 'Error', 'error');
      }
    })
    .catch(function() {
      if (typeof showToast === 'function') showToast('Network error', 'error');
    });
  }
  window.toggleMaintenance = toggleMaintenance;

  // Load initial status
  function loadMaintenanceStatus() {
    fetch(STATUS_URL, { method: 'GET', credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(updateUI)
      .catch(function() {});
  }
  window.loadMaintenanceStatus = loadMaintenanceStatus;

  // Load maintenance status after page is ready.
  document.addEventListener('DOMContentLoaded', function() {
    var section = document.getElementById('notificationMaintenanceSection');
    if (section) {
      setMtDuration(parseInt(document.getElementById('mtDuration').value || '60'));
      loadMaintenanceStatus();
    }
  });
})();
</script>
